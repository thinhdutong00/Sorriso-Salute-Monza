      - generic [ref=f24e513]:
        - generic [ref=f24e514]:
          - group "16 / 17" [ref=f24e515]:
            - generic [ref=f24e517]:
              - img [ref=f24e520]
              - paragraph [ref=f24e524]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f24e528]:
                - strong [ref=f24e529]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f24e530]:
            - generic [ref=f24e532]:
              - img [ref=f24e535]
              - paragraph [ref=f24e539]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f24e543]:
                - strong [ref=f24e544]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f24e545]:
            - generic [ref=f24e547]:
              - img [ref=f24e550]
              - paragraph [ref=f24e554]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f24e558]:
                - strong [ref=f24e559]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f24e560]:
            - generic [ref=f24e562]:
              - img [ref=f24e565]
              - paragraph [ref=f24e569]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f24e573]:
                - strong [ref=f24e574]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f24e575]:
            - generic [ref=f24e577]:
              - img [ref=f24e580]
              - paragraph [ref=f24e584]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f24e588]:
                - strong [ref=f24e589]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f24e590]:
            - generic [ref=f24e592]:
              - img [ref=f24e595]
              - paragraph [ref=f24e599]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f24e603]:
                - strong [ref=f24e604]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f24e605]:
            - generic [ref=f24e607]:
              - img [ref=f24e610]
              - paragraph [ref=f24e614]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f24e618]:
                - strong [ref=f24e619]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f24e620]:
            - generic [ref=f24e622]:
              - img [ref=f24e625]
              - paragraph [ref=f24e629]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f24e633]:
                - strong [ref=f24e634]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f24e635]:
            - generic [ref=f24e637]:
              - img [ref=f24e640]
              - paragraph [ref=f24e644]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f24e648]:
                - strong [ref=f24e649]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f24e650]:
            - generic [ref=f24e652]:
              - img [ref=f24e655]
              - paragraph [ref=f24e659]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f24e663]:
                - strong [ref=f24e664]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f24e665]:
            - generic [ref=f24e667]:
              - img [ref=f24e670]
              - paragraph [ref=f24e674]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f24e678]:
                - strong [ref=f24e679]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f24e680]:
            - generic [ref=f24e682]:
              - img [ref=f24e685]
              - paragraph [ref=f24e689]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f24e693]:
                - strong [ref=f24e694]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f24e695]:
            - generic [ref=f24e697]:
              - img [ref=f24e700]
              - paragraph [ref=f24e704]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f24e708]:
                - strong [ref=f24e709]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f24e710]:
            - generic [ref=f24e712]:
              - img [ref=f24e715]
              - paragraph [ref=f24e719]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f24e723]:
                - strong [ref=f24e724]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f24e725]:
            - generic [ref=f24e727]:
              - img [ref=f24e730]
              - paragraph [ref=f24e734]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f24e738]:
                - strong [ref=f24e739]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f24e740]:
            - generic [ref=f24e742]:
              - img [ref=f24e745]
              - paragraph [ref=f24e749]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f24e753]:
                - strong [ref=f24e754]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f24e755]:
            - generic [ref=f24e757]:
              - img [ref=f24e760]
              - paragraph [ref=f24e764]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f24e768]:
                - strong [ref=f24e769]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f24e770]:
            - generic [ref=f24e772]:
              - img [ref=f24e775]
              - paragraph [ref=f24e779]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f24e783]:
                - strong [ref=f24e784]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f24e785]:
            - generic [ref=f24e787]:
              - img [ref=f24e790]
              - paragraph [ref=f24e794]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f24e798]:
                - strong [ref=f24e799]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f24e800]:
            - generic [ref=f24e802]:
              - img [ref=f24e805]
              - paragraph [ref=f24e809]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f24e813]:
                - strong [ref=f24e814]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f24e815]:
            - generic [ref=f24e817]:
              - img [ref=f24e820]
              - paragraph [ref=f24e824]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f24e828]:
                - strong [ref=f24e829]: Roberta P.
                - text: Paziente
