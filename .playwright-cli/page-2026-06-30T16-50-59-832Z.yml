        - heading [level=2]
        - heading "Come gestire le preferenze e prestare o revocare il consenso su questo Sito Web" [level=3] [ref=f580e74]
        - paragraph [ref=f580e75]: Qualora l’utilizzo dei Tracker sia basato sul consenso, l’Utente può fornire o revocare tale consenso impostando o aggiornando le proprie preferenze tramite il relativo pannello delle scelte in materia di privacy disponibile su questo Sito Web.
        - paragraph [ref=f580e76]: Per quanto riguarda Strumenti di Tracciamento di terza parte, gli Utenti possono gestire le proprie preferenze visitando il relativo link di opt out (qualora disponibile), utilizzando gli strumenti descritti nella privacy policy della terza parte o contattando quest’ultima direttamente.
        - heading "Come controllare o eliminare Cookie e tecnologie simili tramite le impostazioni del tuo dispositivo" [level=4] [ref=f580e77]
        - paragraph [ref=f580e78]: "Gli Utenti possono utilizzare le impostazioni del proprio browser per:"
        - list [ref=f580e79]:
          - listitem [ref=f580e80]: Vedere quali Cookie o altre tecnologie simili sono stati impostati sul dispositivo;
          - listitem [ref=f580e81]: Bloccare Cookie o tecnologie simili;
          - listitem [ref=f580e82]: Cancellare i Cookie o tecnologie simili dal browser.
        - paragraph [ref=f580e83]: Le impostazioni del browser, tuttavia, non consentono un controllo granulare del consenso per categoria.
        - paragraph [ref=f580e84]: "Gli Utenti possono, per esempio, trovare informazioni su come gestire i Cookie in alcuni dei browser più diffusi ai seguenti indirizzi:"
        - list [ref=f580e85]:
          - listitem [ref=f580e86]:
            - link "Google Chrome" [ref=f580e87] [cursor=pointer]:
              - /url: https://support.google.com/chrome/answer/95647?hl=it&amp;p=cpn_cookies
          - listitem [ref=f580e88]:
            - link "Mozilla Firefox" [ref=f580e89] [cursor=pointer]:
              - /url: https://support.mozilla.org/it/kb/Attivare%20e%20disattivare%20i%20cookie
          - listitem [ref=f580e90]:
            - link "Apple Safari" [ref=f580e91] [cursor=pointer]:
              - /url: https://support.apple.com/it-it/guide/safari/manage-cookies-and-website-data-sfri11471/
          - listitem [ref=f580e92]:
            - link "Microsoft Internet Explorer" [ref=f580e93] [cursor=pointer]:
              - /url: http://windows.microsoft.com/it-it/windows-vista/block-or-allow-cookies
          - listitem [ref=f580e94]:
            - link "Microsoft Edge" [ref=f580e95] [cursor=pointer]:
              - /url: https://support.microsoft.com/it-it/help/4027947
          - listitem [ref=f580e96]:
            - link "Brave" [ref=f580e97] [cursor=pointer]:
              - /url: https://support.brave.com/hc/articles/360022806212-How-do-I-use-Shields-while-browsing
          - listitem [ref=f580e98]:
            - link "Opera" [ref=f580e99] [cursor=pointer]:
              - /url: https://help.opera.com/latest/web-preferences/#cookies
        - paragraph [ref=f580e100]: Gli Utenti possono inoltre gestire alcuni Strumenti di Tracciamento per applicazioni mobili disattivandoli tramite le apposite impostazioni del dispositivo, quali le impostazioni di pubblicità per dispositivi mobili o le impostazioni relative al tracciamento in generale (gli Utenti possono consultare le impostazioni del dispositivo per individuare quella pertinente).
        - heading "Come disattivare la pubblicità basata sugli interessi" [level=4] [ref=f580e101]
        - paragraph [ref=f580e102]:
          - text: Fermo restando quanto precede, si informano gli Utenti della possibilità di avvalersi delle informazioni presenti su
          - link "YourOnlineChoices" [ref=f580e103] [cursor=pointer]:
            - /url: http://www.youronlinechoices.eu/
          - text: (UE e Regno Unito),
          - link "Network Advertising Initiative" [ref=f580e104] [cursor=pointer]:
            - /url: https://thenai.org/about-online-advertising/
          - text: (USA) e
          - link "Digital Advertising Alliance" [ref=f580e105] [cursor=pointer]:
            - /url: https://www.aboutads.info/consumers/
          - text: (USA),
          - link "DAAC" [ref=f580e106] [cursor=pointer]:
            - /url: https://youradchoices.ca/understanding-online-advertising/
          - text: (Canada),
          - link "DDAI" [ref=f580e107] [cursor=pointer]:
            - /url: http://www.ddai.info/optout
          - text: (Giappone) o altri servizi analoghi. Con questi servizi è possibile gestire le preferenze di tracciamento della maggior parte degli strumenti pubblicitari. Il Titolare, pertanto, consiglia agli Utenti di utilizzare tali risorse in aggiunta alle informazioni fornite nel presente documento.
        - paragraph [ref=f580e108]:
          - text: La Digital Advertising Alliance mette inoltre a disposizione un’applicazione chiamata
          - link "AppChoices" [ref=f580e109] [cursor=pointer]:
            - /url: https://youradchoices.com/appchoices
          - text: che aiuta gli Utenti a controllare la pubblicità comportamentale sulle applicazioni mobili.
