      - generic [ref=f6e243]:
        - generic [ref=f6e244]:
          - group "17 / 17" [ref=f6e245]:
            - generic [ref=f6e247]:
              - img [ref=f6e250]
              - paragraph [ref=f6e254]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f6e258]:
                - strong [ref=f6e259]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f6e260]:
            - generic [ref=f6e262]:
              - img [ref=f6e265]
              - paragraph [ref=f6e269]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f6e273]:
                - strong [ref=f6e274]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f6e275]:
            - generic [ref=f6e277]:
              - img [ref=f6e280]
              - paragraph [ref=f6e284]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f6e288]:
                - strong [ref=f6e289]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f6e290]:
            - generic [ref=f6e292]:
              - img [ref=f6e295]
              - paragraph [ref=f6e299]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f6e303]:
                - strong [ref=f6e304]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f6e305]:
            - generic [ref=f6e307]:
              - img [ref=f6e310]
              - paragraph [ref=f6e314]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f6e318]:
                - strong [ref=f6e319]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f6e320]:
            - generic [ref=f6e322]:
              - img [ref=f6e325]
              - paragraph [ref=f6e329]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f6e333]:
                - strong [ref=f6e334]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f6e335]:
            - generic [ref=f6e337]:
              - img [ref=f6e340]
              - paragraph [ref=f6e344]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f6e348]:
                - strong [ref=f6e349]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f6e350]:
            - generic [ref=f6e352]:
              - img [ref=f6e355]
              - paragraph [ref=f6e359]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f6e363]:
                - strong [ref=f6e364]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f6e365]:
            - generic [ref=f6e367]:
              - img [ref=f6e370]
              - paragraph [ref=f6e374]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f6e378]:
                - strong [ref=f6e379]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f6e380]:
            - generic [ref=f6e382]:
              - img [ref=f6e385]
              - paragraph [ref=f6e389]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f6e393]:
                - strong [ref=f6e394]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f6e395]:
            - generic [ref=f6e397]:
              - img [ref=f6e400]
              - paragraph [ref=f6e404]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f6e408]:
                - strong [ref=f6e409]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f6e410]:
            - generic [ref=f6e412]:
              - img [ref=f6e415]
              - paragraph [ref=f6e419]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f6e423]:
                - strong [ref=f6e424]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f6e425]:
            - generic [ref=f6e427]:
              - img [ref=f6e430]
              - paragraph [ref=f6e434]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f6e438]:
                - strong [ref=f6e439]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f6e440]:
            - generic [ref=f6e442]:
              - img [ref=f6e445]
              - paragraph [ref=f6e449]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f6e453]:
                - strong [ref=f6e454]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f6e455]:
            - generic [ref=f6e457]:
              - img [ref=f6e460]
              - paragraph [ref=f6e464]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f6e468]:
                - strong [ref=f6e469]: Michael T.
