          - group "15 / 17" [ref=f6e470]:
            - generic [ref=f6e472]:
              - img [ref=f6e475]
              - paragraph [ref=f6e479]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f6e483]:
                - strong [ref=f6e484]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f6e485]:
            - generic [ref=f6e487]:
              - img [ref=f6e490]
              - paragraph [ref=f6e494]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
