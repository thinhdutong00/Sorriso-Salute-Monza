      - generic [ref=f6e225]:
        - generic [ref=f6e226]:
          - group "17 / 17" [ref=f6e227]:
            - generic [ref=f6e229]:
              - img [ref=f6e232]
              - paragraph [ref=f6e236]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f6e240]:
                - strong [ref=f6e241]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f6e242]:
            - generic [ref=f6e244]:
              - img [ref=f6e247]
              - paragraph [ref=f6e251]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f6e255]:
                - strong [ref=f6e256]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f6e257]:
            - generic [ref=f6e259]:
              - img [ref=f6e262]
              - paragraph [ref=f6e266]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f6e270]:
                - strong [ref=f6e271]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f6e272]:
            - generic [ref=f6e274]:
              - img [ref=f6e277]
              - paragraph [ref=f6e281]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f6e285]:
                - strong [ref=f6e286]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f6e287]:
            - generic [ref=f6e289]:
              - img [ref=f6e292]
              - paragraph [ref=f6e296]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f6e300]:
                - strong [ref=f6e301]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f6e302]:
            - generic [ref=f6e304]:
              - img [ref=f6e307]
              - paragraph [ref=f6e311]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f6e315]:
                - strong [ref=f6e316]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f6e317]:
            - generic [ref=f6e319]:
              - img [ref=f6e322]
              - paragraph [ref=f6e326]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f6e330]:
                - strong [ref=f6e331]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f6e332]:
            - generic [ref=f6e334]:
              - img [ref=f6e337]
              - paragraph [ref=f6e341]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f6e345]:
                - strong [ref=f6e346]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f6e347]:
            - generic [ref=f6e349]:
              - img [ref=f6e352]
              - paragraph [ref=f6e356]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f6e360]:
                - strong [ref=f6e361]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f6e362]:
            - generic [ref=f6e364]:
              - img [ref=f6e367]
              - paragraph [ref=f6e371]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f6e375]:
                - strong [ref=f6e376]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f6e377]:
            - generic [ref=f6e379]:
              - img [ref=f6e382]
              - paragraph [ref=f6e386]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f6e390]:
                - strong [ref=f6e391]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f6e392]:
            - generic [ref=f6e394]:
              - img [ref=f6e397]
              - paragraph [ref=f6e401]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f6e405]:
                - strong [ref=f6e406]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f6e407]:
            - generic [ref=f6e409]:
              - img [ref=f6e412]
              - paragraph [ref=f6e416]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f6e420]:
                - strong [ref=f6e421]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f6e422]:
            - generic [ref=f6e424]:
              - img [ref=f6e427]
              - paragraph [ref=f6e431]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f6e435]:
                - strong [ref=f6e436]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f6e437]:
            - generic [ref=f6e439]:
              - img [ref=f6e442]
              - paragraph [ref=f6e446]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f6e450]:
                - strong [ref=f6e451]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f6e452]:
            - generic [ref=f6e454]:
              - img [ref=f6e457]
              - paragraph [ref=f6e461]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f6e465]:
                - strong [ref=f6e466]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f6e467]:
            - generic [ref=f6e469]:
              - img [ref=f6e472]
              - paragraph [ref=f6e476]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f6e480]:
                - strong [ref=f6e481]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f6e482]:
            - generic [ref=f6e484]:
