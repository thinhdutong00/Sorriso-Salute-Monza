            - generic [ref=f6e749]:
              - img [ref=f6e752]
              - paragraph [ref=f6e756]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
