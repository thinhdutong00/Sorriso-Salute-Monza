          - group "14 / 17" [ref=f6e732]:
            - generic [ref=f6e734]:
              - img [ref=f6e737]
              - paragraph [ref=f6e741]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
