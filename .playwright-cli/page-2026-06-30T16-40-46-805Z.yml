            - generic [ref=f6e779]:
              - img [ref=f6e782]
              - paragraph [ref=f6e786]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
