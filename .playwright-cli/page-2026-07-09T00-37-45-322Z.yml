      - generic [ref=f6e238]:
        - generic [ref=f6e239]:
          - group "17 / 17" [ref=f6e240]:
            - generic [ref=f6e242]:
              - img [ref=f6e245]
              - paragraph [ref=f6e249]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f6e253]:
                - strong [ref=f6e254]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f6e255]:
            - generic [ref=f6e257]:
              - img [ref=f6e260]
              - paragraph [ref=f6e264]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f6e268]:
                - strong [ref=f6e269]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f6e270]:
            - generic [ref=f6e272]:
              - img [ref=f6e275]
              - paragraph [ref=f6e279]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f6e283]:
                - strong [ref=f6e284]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f6e285]:
            - generic [ref=f6e287]:
              - img [ref=f6e290]
              - paragraph [ref=f6e294]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f6e298]:
                - strong [ref=f6e299]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f6e300]:
            - generic [ref=f6e302]:
              - img [ref=f6e305]
              - paragraph [ref=f6e309]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f6e313]:
                - strong [ref=f6e314]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f6e315]:
            - generic [ref=f6e317]:
              - img [ref=f6e320]
              - paragraph [ref=f6e324]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f6e328]:
                - strong [ref=f6e329]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f6e330]:
            - generic [ref=f6e332]:
              - img [ref=f6e335]
              - paragraph [ref=f6e339]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f6e343]:
                - strong [ref=f6e344]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f6e345]:
            - generic [ref=f6e347]:
              - img [ref=f6e350]
              - paragraph [ref=f6e354]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f6e358]:
                - strong [ref=f6e359]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f6e360]:
            - generic [ref=f6e362]:
              - img [ref=f6e365]
              - paragraph [ref=f6e369]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f6e373]:
                - strong [ref=f6e374]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f6e375]:
            - generic [ref=f6e377]:
              - img [ref=f6e380]
              - paragraph [ref=f6e384]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f6e388]:
                - strong [ref=f6e389]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f6e390]:
            - generic [ref=f6e392]:
              - img [ref=f6e395]
              - paragraph [ref=f6e399]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f6e403]:
                - strong [ref=f6e404]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f6e405]:
            - generic [ref=f6e407]:
              - img [ref=f6e410]
              - paragraph [ref=f6e414]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f6e418]:
                - strong [ref=f6e419]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f6e420]:
            - generic [ref=f6e422]:
              - img [ref=f6e425]
              - paragraph [ref=f6e429]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f6e433]:
                - strong [ref=f6e434]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f6e435]:
            - generic [ref=f6e437]:
              - img [ref=f6e440]
              - paragraph [ref=f6e444]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f6e448]:
                - strong [ref=f6e449]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f6e450]:
            - generic [ref=f6e452]:
              - img [ref=f6e455]
              - paragraph [ref=f6e459]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f6e463]:
                - strong [ref=f6e464]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f6e465]:
            - generic [ref=f6e467]:
              - img [ref=f6e470]
              - paragraph [ref=f6e474]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f6e478]:
                - strong [ref=f6e479]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f6e480]:
            - generic [ref=f6e482]:
              - img [ref=f6e485]
              - paragraph [ref=f6e489]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f6e493]:
                - strong [ref=f6e494]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f6e495]:
            - generic [ref=f6e497]:
              - img [ref=f6e500]
              - paragraph [ref=f6e504]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
