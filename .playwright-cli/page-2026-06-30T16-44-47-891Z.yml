            - generic [ref=f18e774]:
              - img [ref=f18e777]
              - paragraph [ref=f18e781]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
