          - group "14 / 17" [ref=f18e727]:
            - generic [ref=f18e729]:
              - img [ref=f18e732]
              - paragraph [ref=f18e736]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
