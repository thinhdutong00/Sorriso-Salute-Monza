      - generic [ref=f18e515]:
        - generic [ref=f18e516]:
          - group "17 / 17" [ref=f18e517]:
            - generic [ref=f18e519]:
              - img [ref=f18e522]
              - paragraph [ref=f18e526]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f18e530]:
                - strong [ref=f18e531]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f18e532]:
            - generic [ref=f18e534]:
              - img [ref=f18e537]
              - paragraph [ref=f18e541]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f18e545]:
                - strong [ref=f18e546]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f18e547]:
            - generic [ref=f18e549]:
              - img [ref=f18e552]
              - paragraph [ref=f18e556]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f18e560]:
                - strong [ref=f18e561]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f18e562]:
            - generic [ref=f18e564]:
              - img [ref=f18e567]
              - paragraph [ref=f18e571]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f18e575]:
                - strong [ref=f18e576]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f18e577]:
            - generic [ref=f18e579]:
              - img [ref=f18e582]
              - paragraph [ref=f18e586]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f18e590]:
                - strong [ref=f18e591]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f18e592]:
            - generic [ref=f18e594]:
              - img [ref=f18e597]
              - paragraph [ref=f18e601]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f18e605]:
                - strong [ref=f18e606]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f18e607]:
            - generic [ref=f18e609]:
              - img [ref=f18e612]
              - paragraph [ref=f18e616]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f18e620]:
                - strong [ref=f18e621]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f18e622]:
            - generic [ref=f18e624]:
              - img [ref=f18e627]
              - paragraph [ref=f18e631]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f18e635]:
                - strong [ref=f18e636]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f18e637]:
            - generic [ref=f18e639]:
              - img [ref=f18e642]
              - paragraph [ref=f18e646]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f18e650]:
                - strong [ref=f18e651]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f18e652]:
            - generic [ref=f18e654]:
              - img [ref=f18e657]
              - paragraph [ref=f18e661]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f18e665]:
                - strong [ref=f18e666]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f18e667]:
            - generic [ref=f18e669]:
              - img [ref=f18e672]
              - paragraph [ref=f18e676]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f18e680]:
                - strong [ref=f18e681]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f18e682]:
            - generic [ref=f18e684]:
              - img [ref=f18e687]
              - paragraph [ref=f18e691]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f18e695]:
                - strong [ref=f18e696]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f18e697]:
            - generic [ref=f18e699]:
              - img [ref=f18e702]
              - paragraph [ref=f18e706]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f18e710]:
                - strong [ref=f18e711]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f18e712]:
            - generic [ref=f18e714]:
