          - group "15 / 17" [ref=f18e742]:
            - generic [ref=f18e744]:
              - img [ref=f18e747]
              - paragraph [ref=f18e751]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f18e755]:
                - strong [ref=f18e756]: Samir G.
