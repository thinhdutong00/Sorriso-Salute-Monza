          - group "17 / 17" [ref=f78e262]:
            - generic [ref=f78e264]:
              - img [ref=f78e267]
              - paragraph [ref=f78e271]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f78e275]:
                - strong [ref=f78e276]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f78e277]:
            - generic [ref=f78e279]:
              - img [ref=f78e282]
              - paragraph [ref=f78e286]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f78e290]:
                - strong [ref=f78e291]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f78e292]:
            - generic [ref=f78e294]:
              - img [ref=f78e297]
              - paragraph [ref=f78e301]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f78e305]:
                - strong [ref=f78e306]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f78e307]:
            - generic [ref=f78e309]:
              - img [ref=f78e312]
              - paragraph [ref=f78e316]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f78e320]:
                - strong [ref=f78e321]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f78e322]:
            - generic [ref=f78e324]:
              - img [ref=f78e327]
              - paragraph [ref=f78e331]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f78e335]:
                - strong [ref=f78e336]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f78e337]:
            - generic [ref=f78e339]:
              - img [ref=f78e342]
              - paragraph [ref=f78e346]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f78e350]:
                - strong [ref=f78e351]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f78e352]:
            - generic [ref=f78e354]:
              - img [ref=f78e357]
              - paragraph [ref=f78e361]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f78e365]:
                - strong [ref=f78e366]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f78e367]:
            - generic [ref=f78e369]:
              - img [ref=f78e372]
              - paragraph [ref=f78e376]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f78e380]:
                - strong [ref=f78e381]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f78e382]:
            - generic [ref=f78e384]:
              - img [ref=f78e387]
              - paragraph [ref=f78e391]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f78e395]:
                - strong [ref=f78e396]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f78e397]:
            - generic [ref=f78e399]:
              - img [ref=f78e402]
              - paragraph [ref=f78e406]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f78e410]:
                - strong [ref=f78e411]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f78e412]:
            - generic [ref=f78e414]:
              - img [ref=f78e417]
              - paragraph [ref=f78e421]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f78e425]:
                - strong [ref=f78e426]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f78e427]:
            - generic [ref=f78e429]:
              - img [ref=f78e432]
              - paragraph [ref=f78e436]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f78e440]:
                - strong [ref=f78e441]: Giorgio B.
