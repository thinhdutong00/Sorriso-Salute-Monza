          - group "16 / 17" [ref=e510]:
            - generic [ref=e512]:
              - img [ref=e515]
              - paragraph [ref=e519]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=e523]:
                - strong [ref=e524]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=e525]:
            - generic [ref=e527]:
              - img [ref=e530]
              - paragraph [ref=e534]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=e538]:
                - strong [ref=e539]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=e540]:
            - generic [ref=e542]:
              - img [ref=e545]
              - paragraph [ref=e549]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e553]:
                - strong [ref=e554]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e555]:
            - generic [ref=e557]:
              - img [ref=e560]
              - paragraph [ref=e564]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=e568]:
                - strong [ref=e569]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e570]:
            - generic [ref=e572]:
              - img [ref=e575]
              - paragraph [ref=e579]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e583]:
                - strong [ref=e584]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e585]:
            - generic [ref=e587]:
              - img [ref=e590]
              - paragraph [ref=e594]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=e598]:
                - strong [ref=e599]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=e600]:
            - generic [ref=e602]:
              - img [ref=e605]
              - paragraph [ref=e609]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=e613]:
                - strong [ref=e614]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=e615]:
            - generic [ref=e617]:
              - img [ref=e620]
              - paragraph [ref=e624]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=e628]:
                - strong [ref=e629]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=e630]:
            - generic [ref=e632]:
              - img [ref=e635]
              - paragraph [ref=e639]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=e643]:
                - strong [ref=e644]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=e645]:
            - generic [ref=e647]:
              - img [ref=e650]
              - paragraph [ref=e654]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=e658]:
                - strong [ref=e659]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=e660]:
            - generic [ref=e662]:
              - img [ref=e665]
