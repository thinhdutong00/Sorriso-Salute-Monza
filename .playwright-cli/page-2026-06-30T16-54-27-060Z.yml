        - heading "Implantologia" [level=1] [ref=f892e33]
        - paragraph [ref=f892e34]: Sostituisci i denti mancanti con soluzioni stabili, progettate per tornare a sorridere e masticare con sicurezza.
        - paragraph [ref=f892e35]:
          - strong [ref=f892e36]: Dal 2003 a Monza, attraverso solo la chirurgia implantare, abbiamo aiutato oltre 10.000 persone a ritrovare la sicurezza di sorridere e il piacere di masticare senza dolore.
          - text: Che ti manchi un solo dente o un'intera arcata, progettiamo la soluzione implantare su misura per restituirti il comfort che stai cercando.
    - region "In quale di queste situazioni ti trovi oggi?" [ref=f892e37]:
      - generic [ref=f892e38]:
        - paragraph [ref=f892e39]: AFFIDATI AI NOSTRI SPECIALISTI
        - heading "In quale di queste situazioni ti trovi oggi?" [level=2] [ref=f892e40]
        - paragraph [ref=f892e41]:
          - strong [ref=f892e42]: Più di 10.000 impianti posizionati e protesi stabilizzate con successo in 23 anni di attività.
      - generic "Situazioni implantari frequenti" [ref=f892e43]:
        - article [ref=f892e44]:
          - generic [ref=f892e46]:
            - generic [ref=f892e47]: Dente mancante
            - heading "Mi manca un solo dente" [level=3] [ref=f892e48]
            - paragraph [ref=f892e49]: Ripristina l'estetica e la funzionalità del tuo sorriso con un impianto di eccellenza. Una soluzione fissa e invisibile che preserva la salute dei denti adiacenti, garantendo un risultato naturale nel massimo comfort clinico.
            - button "Scopri le nostre convenzioni" [ref=f892e51] [cursor=pointer]
        - article [ref=f892e52]:
          - generic [ref=f892e54]:
            - generic [ref=f892e55]: Più denti mancanti
            - heading "Mi mancano più denti vicini" [level=3] [ref=f892e56]
            - paragraph [ref=f892e57]: Riscopri il piacere di una masticazione sicura. I nostri ponti su impianti offrono una stabilità assoluta, superando i limiti e i disagi delle soluzioni mobili. Un percorso riabilitativo sereno, per denti forti e duraturi.
            - button "Scopri le nostre convenzioni" [ref=f892e59] [cursor=pointer]
        - article [ref=f892e60]:
          - generic [ref=f892e62]:
            - generic [ref=f892e63]: Protesi mobile instabile
            - heading "La mia dentiera si muove" [level=3] [ref=f892e64]
            - paragraph [ref=f892e65]: Restituisci sicurezza e stabilità alla tua quotidianità. Ancoriamo saldamente la tua protesi attraverso soluzioni implantari minimamente invasive, eliminando ogni incertezza. Per un benessere prolungato e una ritrovata libertà.
            - button "Scopri le nostre convenzioni" [ref=f892e67] [cursor=pointer]
        - article [ref=f892e68]:
          - generic [ref=f892e70]:
            - generic [ref=f892e71]: Arcata completa / molti denti mancanti
            - heading "Ho perso molti denti o uso una dentiera" [level=3] [ref=f892e72]
            - paragraph [ref=f892e73]: L'eccellenza implantare per una riabilitazione totale. Grazie a protocolli clinici avanzati, puoi ottenere un'arcata fissa definitiva, spesso in meno di 24 ore. Un intervento delicato per restituirti un sorriso completo e funzionale.
            - button "Scopri le nostre convenzioni" [ref=f892e75] [cursor=pointer]
