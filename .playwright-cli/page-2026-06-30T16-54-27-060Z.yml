        - heading "Trasparenza e Tutele Cliniche" [level=2] [ref=f892e150]
        - paragraph [ref=f892e151]: La scelta di riabilitare il sorriso richiede massima chiarezza. Abbiamo eliminato ogni incertezza clinica ed economica formulando quattro garanzie scritte a salvaguardia del paziente.
