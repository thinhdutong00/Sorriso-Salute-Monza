          - group "2 / 17" [ref=e598]:
            - generic [ref=e600]:
              - img [ref=e603]
              - paragraph [ref=e607]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
