      - generic [ref=f6e219]:
        - generic [ref=f6e220]:
          - group "17 / 17" [ref=f6e221]:
            - generic [ref=f6e223]:
              - img [ref=f6e226]
              - paragraph [ref=f6e230]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f6e234]:
                - strong [ref=f6e235]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f6e236]:
            - generic [ref=f6e238]:
              - img [ref=f6e241]
              - paragraph [ref=f6e245]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f6e249]:
                - strong [ref=f6e250]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f6e251]:
            - generic [ref=f6e253]:
              - img [ref=f6e256]
              - paragraph [ref=f6e260]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f6e264]:
                - strong [ref=f6e265]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f6e266]:
            - generic [ref=f6e268]:
              - img [ref=f6e271]
              - paragraph [ref=f6e275]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f6e279]:
                - strong [ref=f6e280]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f6e281]:
            - generic [ref=f6e283]:
              - img [ref=f6e286]
              - paragraph [ref=f6e290]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f6e294]:
                - strong [ref=f6e295]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f6e296]:
            - generic [ref=f6e298]:
              - img [ref=f6e301]
              - paragraph [ref=f6e305]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f6e309]:
                - strong [ref=f6e310]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f6e311]:
            - generic [ref=f6e313]:
              - img [ref=f6e316]
              - paragraph [ref=f6e320]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f6e324]:
                - strong [ref=f6e325]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f6e326]:
            - generic [ref=f6e328]:
              - img [ref=f6e331]
              - paragraph [ref=f6e335]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f6e339]:
                - strong [ref=f6e340]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f6e341]:
            - generic [ref=f6e343]:
              - img [ref=f6e346]
              - paragraph [ref=f6e350]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f6e354]:
                - strong [ref=f6e355]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f6e356]:
            - generic [ref=f6e358]:
              - img [ref=f6e361]
              - paragraph [ref=f6e365]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f6e369]:
                - strong [ref=f6e370]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f6e371]:
            - generic [ref=f6e373]:
              - img [ref=f6e376]
              - paragraph [ref=f6e380]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f6e384]:
                - strong [ref=f6e385]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f6e386]:
            - generic [ref=f6e388]:
              - img [ref=f6e391]
              - paragraph [ref=f6e395]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f6e399]:
                - strong [ref=f6e400]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f6e401]:
            - generic [ref=f6e403]:
              - img [ref=f6e406]
              - paragraph [ref=f6e410]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f6e414]:
                - strong [ref=f6e415]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f6e416]:
            - generic [ref=f6e418]:
              - img [ref=f6e421]
              - paragraph [ref=f6e425]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f6e429]:
                - strong [ref=f6e430]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f6e431]:
            - generic [ref=f6e433]:
              - img [ref=f6e436]
              - paragraph [ref=f6e440]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f6e444]:
                - strong [ref=f6e445]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f6e446]:
            - generic [ref=f6e448]:
              - img [ref=f6e451]
              - paragraph [ref=f6e455]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f6e459]:
                - strong [ref=f6e460]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f6e461]:
            - generic [ref=f6e463]:
              - img [ref=f6e466]
              - paragraph [ref=f6e470]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f6e474]:
                - strong [ref=f6e475]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f6e476]:
            - generic [ref=f6e478]:
              - img [ref=f6e481]
              - paragraph [ref=f6e485]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f6e489]:
