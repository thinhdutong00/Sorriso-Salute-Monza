            - generic [ref=e572]:
              - img [ref=e575]
              - paragraph [ref=e579]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
