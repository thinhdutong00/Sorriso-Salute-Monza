          - group "1 / 17" [ref=e585]:
            - generic [ref=e587]:
              - img [ref=e590]
              - paragraph [ref=e594]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e598]:
                - strong [ref=e599]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e600]:
            - generic [ref=e602]:
              - img [ref=e605]
              - paragraph [ref=e609]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=e613]:
                - strong [ref=e614]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e615]:
            - generic [ref=e617]:
              - img [ref=e620]
              - paragraph [ref=e624]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e628]:
                - strong [ref=e629]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e630]:
            - generic [ref=e632]:
              - img [ref=e635]
              - paragraph [ref=e639]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
