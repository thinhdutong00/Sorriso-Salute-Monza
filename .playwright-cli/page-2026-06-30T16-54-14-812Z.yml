        - article [ref=f888e37]:
          - generic [ref=f888e39]:
            - generic [ref=f888e40]: Più denti mancanti
            - heading "Mi mancano più denti vicini" [level=3] [ref=f888e41]
            - paragraph [ref=f888e42]: Riscopri il piacere di una masticazione sicura. I nostri ponti su impianti offrono una stabilità assoluta, superando i limiti e i disagi delle soluzioni mobili. Un percorso riabilitativo sereno, per denti forti e duraturi.
            - button "Scopri le nostre convenzioni" [ref=f888e44] [cursor=pointer]
        - article [ref=f888e45]:
          - generic [ref=f888e47]:
            - generic [ref=f888e48]: Protesi mobile instabile
            - heading "La mia dentiera si muove" [level=3] [ref=f888e49]
            - paragraph [ref=f888e50]: Restituisci sicurezza e stabilità alla tua quotidianità. Ancoriamo saldamente la tua protesi attraverso soluzioni implantari minimamente invasive, eliminando ogni incertezza. Per un benessere prolungato e una ritrovata libertà.
            - button "Scopri le nostre convenzioni" [ref=f888e52] [cursor=pointer]
        - article [ref=f888e53]:
          - generic [ref=f888e55]:
            - generic [ref=f888e56]: Arcata completa / molti denti mancanti
            - heading "Ho perso molti denti o uso una dentiera" [level=3] [ref=f888e57]
            - paragraph [ref=f888e58]: L'eccellenza implantare per una riabilitazione totale. Grazie a protocolli clinici avanzati, puoi ottenere un'arcata fissa definitiva, spesso in meno di 24 ore. Un intervento delicato per restituirti un sorriso completo e funzionale.
            - button "Scopri le nostre convenzioni" [ref=f888e60] [cursor=pointer]
