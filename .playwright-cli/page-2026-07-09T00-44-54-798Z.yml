                - text: Paziente
          - group "2 / 17" [ref=e596]:
            - generic [ref=e598]:
              - img [ref=e601]
              - paragraph [ref=e605]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
