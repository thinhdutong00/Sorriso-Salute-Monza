          - group "1 / 17" [ref=e581]:
            - generic [ref=e583]:
              - img [ref=e586]
              - paragraph [ref=e590]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
