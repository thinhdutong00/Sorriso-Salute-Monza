                - text: Paziente
          - group "3 / 17" [ref=e611]:
            - generic [ref=e613]:
              - img [ref=e616]
              - paragraph [ref=e620]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e624]:
                - strong [ref=e625]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e626]:
            - generic [ref=e628]:
              - img [ref=e631]
