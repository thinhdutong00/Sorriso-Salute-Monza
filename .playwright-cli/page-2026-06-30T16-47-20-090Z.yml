          - heading "Gestione Immediata delle Urgenze in Giornata" [level=3] [ref=f231e157]
          - paragraph [ref=f231e158]: "In caso di dubbi o fastidi nel post-operatorio, applichiamo un protocollo interno rigido: ti assicuriamo una corsia preferenziale con visita e assistenza in sede il giorno stesso della tua chiamata, senza lasciarti mai solo."
        - article [ref=f231e159]:
