        - heading "Trasparenza e Tutele Cliniche" [level=2] [ref=f231e144]
        - paragraph [ref=f231e145]: La scelta di riabilitare il sorriso richiede massima chiarezza. Abbiamo eliminato ogni incertezza clinica ed economica formulando quattro garanzie scritte a salvaguardia del paziente.
