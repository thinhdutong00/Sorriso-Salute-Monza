          - group "17 / 17" [ref=e578]:
            - generic [ref=e580]:
              - img [ref=e583]
              - paragraph [ref=e587]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=e591]:
                - strong [ref=e592]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=e593]:
            - generic [ref=e595]:
              - img [ref=e598]
              - paragraph [ref=e602]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e606]:
                - strong [ref=e607]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e608]:
            - generic [ref=e610]:
              - img [ref=e613]
              - paragraph [ref=e617]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=e621]:
                - strong [ref=e622]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e623]:
            - generic [ref=e625]:
              - img [ref=e628]
              - paragraph [ref=e632]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e636]:
                - strong [ref=e637]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e638]:
            - generic [ref=e640]:
              - img [ref=e643]
              - paragraph [ref=e647]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=e651]:
                - strong [ref=e652]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=e653]:
            - generic [ref=e655]:
              - img [ref=e658]
              - paragraph [ref=e662]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=e666]:
                - strong [ref=e667]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=e668]:
            - generic [ref=e670]:
              - img [ref=e673]
              - paragraph [ref=e677]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=e681]:
                - strong [ref=e682]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=e683]:
            - generic [ref=e685]:
              - img [ref=e688]
