          - group "17 / 17" [ref=e833]:
            - generic [ref=e835]:
              - img [ref=e838]
              - paragraph [ref=e842]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
