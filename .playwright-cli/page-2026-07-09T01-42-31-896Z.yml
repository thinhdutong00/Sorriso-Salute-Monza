          - group "2 / 17" [ref=f7e829]:
            - generic [ref=f7e831]:
              - img [ref=f7e834]
              - paragraph [ref=f7e838]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - button "leggi di più" [ref=f7e839] [cursor=pointer]
