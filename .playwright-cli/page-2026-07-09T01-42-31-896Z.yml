      - generic [ref=f7e505]:
        - generic [ref=f7e506]:
          - group "15 / 17" [ref=f7e507]:
            - generic [ref=f7e509]:
              - img [ref=f7e512]
              - paragraph [ref=f7e516]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f7e520]:
                - strong [ref=f7e521]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f7e522]:
            - generic [ref=f7e524]:
              - img [ref=f7e527]
              - paragraph [ref=f7e531]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f7e535]:
                - strong [ref=f7e536]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f7e537]:
            - generic [ref=f7e539]:
              - img [ref=f7e542]
              - paragraph [ref=f7e546]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - button "leggi di più" [ref=f7e547] [cursor=pointer]
              - generic [ref=f7e551]:
                - strong [ref=f7e552]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f7e553]:
            - generic [ref=f7e555]:
              - img [ref=f7e558]
              - paragraph [ref=f7e562]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - button "leggi di più" [ref=f7e563] [cursor=pointer]
              - generic [ref=f7e567]:
                - strong [ref=f7e568]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f7e569]:
            - generic [ref=f7e571]:
              - img [ref=f7e574]
              - paragraph [ref=f7e578]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - button "leggi di più" [ref=f7e579] [cursor=pointer]
              - generic [ref=f7e583]:
                - strong [ref=f7e584]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f7e585]:
            - generic [ref=f7e587]:
              - img [ref=f7e590]
              - paragraph [ref=f7e594]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - button "leggi di più" [ref=f7e595] [cursor=pointer]
              - generic [ref=f7e599]:
                - strong [ref=f7e600]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f7e601]:
            - generic [ref=f7e603]:
              - img [ref=f7e606]
              - paragraph [ref=f7e610]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f7e614]:
                - strong [ref=f7e615]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f7e616]:
            - generic [ref=f7e618]:
              - img [ref=f7e621]
              - paragraph [ref=f7e625]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - button "leggi di più" [ref=f7e626] [cursor=pointer]
              - generic [ref=f7e630]:
                - strong [ref=f7e631]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f7e632]:
            - generic [ref=f7e634]:
              - img [ref=f7e637]
              - paragraph [ref=f7e641]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f7e645]:
                - strong [ref=f7e646]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f7e647]:
            - generic [ref=f7e649]:
              - img [ref=f7e652]
              - paragraph [ref=f7e656]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f7e660]:
                - strong [ref=f7e661]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f7e662]:
            - generic [ref=f7e664]:
              - img [ref=f7e667]
              - paragraph [ref=f7e671]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f7e675]:
                - strong [ref=f7e676]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f7e677]:
            - generic [ref=f7e679]:
              - img [ref=f7e682]
              - paragraph [ref=f7e686]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f7e690]:
                - strong [ref=f7e691]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f7e692]:
            - generic [ref=f7e694]:
              - img [ref=f7e697]
              - paragraph [ref=f7e701]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f7e705]:
                - strong [ref=f7e706]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f7e707]:
            - generic [ref=f7e709]:
              - img [ref=f7e712]
              - paragraph [ref=f7e716]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f7e720]:
                - strong [ref=f7e721]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f7e722]:
            - generic [ref=f7e724]:
              - img [ref=f7e727]
              - paragraph [ref=f7e731]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f7e735]:
                - strong [ref=f7e736]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f7e737]:
            - generic [ref=f7e739]:
              - img [ref=f7e742]
              - paragraph [ref=f7e746]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f7e750]:
                - strong [ref=f7e751]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f7e752]:
            - generic [ref=f7e754]:
              - img [ref=f7e757]
              - paragraph [ref=f7e761]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f7e765]:
                - strong [ref=f7e766]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f7e767]:
            - generic [ref=f7e769]:
              - img [ref=f7e772]
              - paragraph [ref=f7e776]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f7e780]:
                - strong [ref=f7e781]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f7e782]:
            - generic [ref=f7e784]:
              - img [ref=f7e787]
              - paragraph [ref=f7e791]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f7e795]:
                - strong [ref=f7e796]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f7e797]:
            - generic [ref=f7e799]:
              - img [ref=f7e802]
              - paragraph [ref=f7e806]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - button "leggi di più" [ref=f7e807] [cursor=pointer]
              - generic [ref=f7e811]:
                - strong [ref=f7e812]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f7e813]:
            - generic [ref=f7e815]:
              - img [ref=f7e818]
              - paragraph [ref=f7e822]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - button "leggi di più" [ref=f7e823] [cursor=pointer]
