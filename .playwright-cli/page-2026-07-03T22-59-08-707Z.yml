      - generic [ref=f6e231]:
        - generic [ref=f6e232]:
          - group "17 / 17" [ref=f6e233]:
            - generic [ref=f6e235]:
              - img [ref=f6e238]
              - paragraph [ref=f6e242]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f6e246]:
                - strong [ref=f6e247]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f6e248]:
            - generic [ref=f6e250]:
              - img [ref=f6e253]
              - paragraph [ref=f6e257]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f6e261]:
                - strong [ref=f6e262]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f6e263]:
            - generic [ref=f6e265]:
              - img [ref=f6e268]
              - paragraph [ref=f6e272]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f6e276]:
                - strong [ref=f6e277]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f6e278]:
            - generic [ref=f6e280]:
              - img [ref=f6e283]
              - paragraph [ref=f6e287]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f6e291]:
                - strong [ref=f6e292]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f6e293]:
            - generic [ref=f6e295]:
              - img [ref=f6e298]
              - paragraph [ref=f6e302]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f6e306]:
                - strong [ref=f6e307]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f6e308]:
            - generic [ref=f6e310]:
              - img [ref=f6e313]
              - paragraph [ref=f6e317]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f6e321]:
                - strong [ref=f6e322]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f6e323]:
            - generic [ref=f6e325]:
              - img [ref=f6e328]
              - paragraph [ref=f6e332]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f6e336]:
                - strong [ref=f6e337]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f6e338]:
            - generic [ref=f6e340]:
              - img [ref=f6e343]
              - paragraph [ref=f6e347]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f6e351]:
                - strong [ref=f6e352]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f6e353]:
            - generic [ref=f6e355]:
              - img [ref=f6e358]
              - paragraph [ref=f6e362]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f6e366]:
                - strong [ref=f6e367]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f6e368]:
            - generic [ref=f6e370]:
              - img [ref=f6e373]
              - paragraph [ref=f6e377]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f6e381]:
                - strong [ref=f6e382]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f6e383]:
            - generic [ref=f6e385]:
              - img [ref=f6e388]
              - paragraph [ref=f6e392]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f6e396]:
                - strong [ref=f6e397]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f6e398]:
            - generic [ref=f6e400]:
              - img [ref=f6e403]
              - paragraph [ref=f6e407]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f6e411]:
                - strong [ref=f6e412]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f6e413]:
            - generic [ref=f6e415]:
              - img [ref=f6e418]
              - paragraph [ref=f6e422]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f6e426]:
                - strong [ref=f6e427]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f6e428]:
            - generic [ref=f6e430]:
              - img [ref=f6e433]
              - paragraph [ref=f6e437]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f6e441]:
                - strong [ref=f6e442]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f6e443]:
            - generic [ref=f6e445]:
              - img [ref=f6e448]
              - paragraph [ref=f6e452]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f6e456]:
                - strong [ref=f6e457]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f6e458]:
            - generic [ref=f6e460]:
              - img [ref=f6e463]
              - paragraph [ref=f6e467]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f6e471]:
                - strong [ref=f6e472]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f6e473]:
            - generic [ref=f6e475]:
              - img [ref=f6e478]
              - paragraph [ref=f6e482]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f6e486]:
                - strong [ref=f6e487]: Giacomo I.
