          - group "17 / 17" [ref=e571]:
            - generic [ref=e573]:
              - img [ref=e576]
              - paragraph [ref=e580]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=e584]:
                - strong [ref=e585]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=e586]:
            - generic [ref=e588]:
              - img [ref=e591]
              - paragraph [ref=e595]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e599]:
                - strong [ref=e600]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e601]:
            - generic [ref=e603]:
              - img [ref=e606]
              - paragraph [ref=e610]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=e614]:
                - strong [ref=e615]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e616]:
            - generic [ref=e618]:
              - img [ref=e621]
              - paragraph [ref=e625]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e629]:
                - strong [ref=e630]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e631]:
            - generic [ref=e633]:
              - img [ref=e636]
              - paragraph [ref=e640]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=e644]:
                - strong [ref=e645]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=e646]:
            - generic [ref=e648]:
              - img [ref=e651]
              - paragraph [ref=e655]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=e659]:
                - strong [ref=e660]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=e661]:
            - generic [ref=e663]:
              - img [ref=e666]
              - paragraph [ref=e670]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=e674]:
                - strong [ref=e675]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=e676]:
            - generic [ref=e678]:
              - img [ref=e681]
              - paragraph [ref=e685]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=e689]:
                - strong [ref=e690]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=e691]:
            - generic [ref=e693]:
              - img [ref=e696]
              - paragraph [ref=e700]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
