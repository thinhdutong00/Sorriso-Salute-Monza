          - group "17 / 17" [ref=e569]:
            - generic [ref=e571]:
              - img [ref=e574]
              - paragraph [ref=e578]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=e582]:
                - strong [ref=e583]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=e584]:
            - generic [ref=e586]:
              - img [ref=e589]
              - paragraph [ref=e593]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e597]:
                - strong [ref=e598]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e599]:
            - generic [ref=e601]:
              - img [ref=e604]
              - paragraph [ref=e608]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=e612]:
                - strong [ref=e613]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e614]:
            - generic [ref=e616]:
              - img [ref=e619]
              - paragraph [ref=e623]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e627]:
                - strong [ref=e628]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e629]:
            - generic [ref=e631]:
              - img [ref=e634]
              - paragraph [ref=e638]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=e642]:
                - strong [ref=e643]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=e644]:
            - generic [ref=e646]:
              - img [ref=e649]
              - paragraph [ref=e653]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=e657]:
                - strong [ref=e658]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=e659]:
            - generic [ref=e661]:
              - img [ref=e664]
              - paragraph [ref=e668]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=e672]:
                - strong [ref=e673]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=e674]:
            - generic [ref=e676]:
              - img [ref=e679]
              - paragraph [ref=e683]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=e687]:
                - strong [ref=e688]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=e689]:
            - generic [ref=e691]:
              - img [ref=e694]
              - paragraph [ref=e698]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
