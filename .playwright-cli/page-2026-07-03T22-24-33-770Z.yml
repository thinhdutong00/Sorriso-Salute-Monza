      - generic [ref=f12e225]:
        - generic [ref=f12e226]:
          - group "17 / 17" [ref=f12e227]:
            - generic [ref=f12e229]:
              - img [ref=f12e232]
              - paragraph [ref=f12e236]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f12e240]:
                - strong [ref=f12e241]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f12e242]:
            - generic [ref=f12e244]:
              - img [ref=f12e247]
              - paragraph [ref=f12e251]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f12e255]:
                - strong [ref=f12e256]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f12e257]:
            - generic [ref=f12e259]:
              - img [ref=f12e262]
              - paragraph [ref=f12e266]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f12e270]:
                - strong [ref=f12e271]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f12e272]:
            - generic [ref=f12e274]:
              - img [ref=f12e277]
              - paragraph [ref=f12e281]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f12e285]:
                - strong [ref=f12e286]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f12e287]:
            - generic [ref=f12e289]:
              - img [ref=f12e292]
              - paragraph [ref=f12e296]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f12e300]:
                - strong [ref=f12e301]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f12e302]:
            - generic [ref=f12e304]:
              - img [ref=f12e307]
              - paragraph [ref=f12e311]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f12e315]:
                - strong [ref=f12e316]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f12e317]:
            - generic [ref=f12e319]:
              - img [ref=f12e322]
              - paragraph [ref=f12e326]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f12e330]:
                - strong [ref=f12e331]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f12e332]:
            - generic [ref=f12e334]:
              - img [ref=f12e337]
              - paragraph [ref=f12e341]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f12e345]:
                - strong [ref=f12e346]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f12e347]:
            - generic [ref=f12e349]:
              - img [ref=f12e352]
              - paragraph [ref=f12e356]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f12e360]:
                - strong [ref=f12e361]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f12e362]:
            - generic [ref=f12e364]:
              - img [ref=f12e367]
              - paragraph [ref=f12e371]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f12e375]:
                - strong [ref=f12e376]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f12e377]:
            - generic [ref=f12e379]:
              - img [ref=f12e382]
              - paragraph [ref=f12e386]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f12e390]:
                - strong [ref=f12e391]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f12e392]:
            - generic [ref=f12e394]:
              - img [ref=f12e397]
              - paragraph [ref=f12e401]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f12e405]:
                - strong [ref=f12e406]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f12e407]:
            - generic [ref=f12e409]:
              - img [ref=f12e412]
              - paragraph [ref=f12e416]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f12e420]:
                - strong [ref=f12e421]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f12e422]:
            - generic [ref=f12e424]:
              - img [ref=f12e427]
              - paragraph [ref=f12e431]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f12e435]:
                - strong [ref=f12e436]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f12e437]:
            - generic [ref=f12e439]:
              - img [ref=f12e442]
              - paragraph [ref=f12e446]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f12e450]:
                - strong [ref=f12e451]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f12e452]:
            - generic [ref=f12e454]:
              - img [ref=f12e457]
              - paragraph [ref=f12e461]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f12e465]:
                - strong [ref=f12e466]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f12e467]:
            - generic [ref=f12e469]:
              - img [ref=f12e472]
              - paragraph [ref=f12e476]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
