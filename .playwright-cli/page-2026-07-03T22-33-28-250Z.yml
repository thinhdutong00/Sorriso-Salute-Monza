      - generic [ref=f12e231]:
        - generic [ref=f12e232]:
          - group "17 / 17" [ref=f12e233]:
            - generic [ref=f12e235]:
              - img [ref=f12e238]
              - paragraph [ref=f12e242]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f12e246]:
                - strong [ref=f12e247]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f12e248]:
            - generic [ref=f12e250]:
              - img [ref=f12e253]
              - paragraph [ref=f12e257]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f12e261]:
                - strong [ref=f12e262]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f12e263]:
            - generic [ref=f12e265]:
              - img [ref=f12e268]
              - paragraph [ref=f12e272]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f12e276]:
                - strong [ref=f12e277]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f12e278]:
            - generic [ref=f12e280]:
              - img [ref=f12e283]
              - paragraph [ref=f12e287]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f12e291]:
                - strong [ref=f12e292]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f12e293]:
            - generic [ref=f12e295]:
              - img [ref=f12e298]
              - paragraph [ref=f12e302]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f12e306]:
                - strong [ref=f12e307]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f12e308]:
            - generic [ref=f12e310]:
              - img [ref=f12e313]
              - paragraph [ref=f12e317]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f12e321]:
                - strong [ref=f12e322]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f12e323]:
            - generic [ref=f12e325]:
              - img [ref=f12e328]
              - paragraph [ref=f12e332]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f12e336]:
                - strong [ref=f12e337]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f12e338]:
            - generic [ref=f12e340]:
              - img [ref=f12e343]
              - paragraph [ref=f12e347]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f12e351]:
                - strong [ref=f12e352]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f12e353]:
            - generic [ref=f12e355]:
              - img [ref=f12e358]
              - paragraph [ref=f12e362]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f12e366]:
                - strong [ref=f12e367]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f12e368]:
            - generic [ref=f12e370]:
              - img [ref=f12e373]
              - paragraph [ref=f12e377]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f12e381]:
                - strong [ref=f12e382]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f12e383]:
            - generic [ref=f12e385]:
              - img [ref=f12e388]
              - paragraph [ref=f12e392]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f12e396]:
                - strong [ref=f12e397]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f12e398]:
            - generic [ref=f12e400]:
              - img [ref=f12e403]
              - paragraph [ref=f12e407]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f12e411]:
                - strong [ref=f12e412]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f12e413]:
            - generic [ref=f12e415]:
              - img [ref=f12e418]
              - paragraph [ref=f12e422]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f12e426]:
                - strong [ref=f12e427]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f12e428]:
            - generic [ref=f12e430]:
              - img [ref=f12e433]
              - paragraph [ref=f12e437]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f12e441]:
                - strong [ref=f12e442]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f12e443]:
            - generic [ref=f12e445]:
              - img [ref=f12e448]
              - paragraph [ref=f12e452]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f12e456]:
                - strong [ref=f12e457]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f12e458]:
            - generic [ref=f12e460]:
              - img [ref=f12e463]
              - paragraph [ref=f12e467]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f12e471]:
                - strong [ref=f12e472]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f12e473]:
            - generic [ref=f12e475]:
              - img [ref=f12e478]
              - paragraph [ref=f12e482]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f12e486]:
                - strong [ref=f12e487]: Giacomo I.
