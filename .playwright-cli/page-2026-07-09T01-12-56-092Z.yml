            - generic [ref=e557]:
              - img [ref=e560]
              - paragraph [ref=e564]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
