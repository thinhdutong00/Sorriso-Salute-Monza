          - group "1 / 17" [ref=e570]:
            - generic [ref=e572]:
              - img [ref=e575]
              - paragraph [ref=e579]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e583]:
                - strong [ref=e584]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e585]:
            - generic [ref=e587]:
              - img [ref=e590]
              - paragraph [ref=e594]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=e598]:
                - strong [ref=e599]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e600]:
            - generic [ref=e602]:
              - img [ref=e605]
              - paragraph [ref=e609]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e613]:
                - strong [ref=e614]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e615]:
            - generic [ref=e617]:
              - img [ref=e620]
              - paragraph [ref=e624]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
