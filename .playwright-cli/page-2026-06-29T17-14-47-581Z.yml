          - group "17 / 17" [ref=e549]:
            - generic [ref=e551]:
              - img [ref=e554]
              - paragraph [ref=e558]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=e562]:
