                - text: Paziente
          - group "1 / 17" [ref=e564]:
            - generic [ref=e566]:
              - img [ref=e569]
              - paragraph [ref=e573]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e577]:
                - strong [ref=e578]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e579]:
            - generic [ref=e581]:
              - img [ref=e584]
              - paragraph [ref=e588]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=e592]:
                - strong [ref=e593]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e594]:
            - generic [ref=e596]:
              - img [ref=e599]
              - paragraph [ref=e603]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e607]:
                - strong [ref=e608]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e609]:
            - generic [ref=e611]:
              - img [ref=e614]
              - paragraph [ref=e618]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=e622]:
                - strong [ref=e623]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=e624]:
            - generic [ref=e626]:
              - img [ref=e629]
              - paragraph [ref=e633]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=e637]:
                - strong [ref=e638]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=e639]:
            - generic [ref=e641]:
              - img [ref=e644]
              - paragraph [ref=e648]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=e652]:
                - strong [ref=e653]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=e654]:
            - generic [ref=e656]:
              - img [ref=e659]
