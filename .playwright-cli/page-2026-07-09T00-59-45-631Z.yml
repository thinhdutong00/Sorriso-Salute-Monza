      - generic [ref=f6e242]:
        - generic [ref=f6e243]:
          - group "17 / 17" [ref=f6e244]:
            - generic [ref=f6e246]:
              - img [ref=f6e249]
              - paragraph [ref=f6e253]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f6e257]:
                - strong [ref=f6e258]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f6e259]:
            - generic [ref=f6e261]:
              - img [ref=f6e264]
              - paragraph [ref=f6e268]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f6e272]:
                - strong [ref=f6e273]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f6e274]:
            - generic [ref=f6e276]:
              - img [ref=f6e279]
              - paragraph [ref=f6e283]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f6e287]:
                - strong [ref=f6e288]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f6e289]:
            - generic [ref=f6e291]:
              - img [ref=f6e294]
              - paragraph [ref=f6e298]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f6e302]:
                - strong [ref=f6e303]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f6e304]:
            - generic [ref=f6e306]:
              - img [ref=f6e309]
              - paragraph [ref=f6e313]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f6e317]:
                - strong [ref=f6e318]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f6e319]:
            - generic [ref=f6e321]:
              - img [ref=f6e324]
              - paragraph [ref=f6e328]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f6e332]:
                - strong [ref=f6e333]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f6e334]:
            - generic [ref=f6e336]:
              - img [ref=f6e339]
              - paragraph [ref=f6e343]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f6e347]:
                - strong [ref=f6e348]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f6e349]:
            - generic [ref=f6e351]:
              - img [ref=f6e354]
              - paragraph [ref=f6e358]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f6e362]:
                - strong [ref=f6e363]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f6e364]:
            - generic [ref=f6e366]:
              - img [ref=f6e369]
              - paragraph [ref=f6e373]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f6e377]:
                - strong [ref=f6e378]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f6e379]:
            - generic [ref=f6e381]:
              - img [ref=f6e384]
              - paragraph [ref=f6e388]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f6e392]:
                - strong [ref=f6e393]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f6e394]:
            - generic [ref=f6e396]:
              - img [ref=f6e399]
              - paragraph [ref=f6e403]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f6e407]:
                - strong [ref=f6e408]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f6e409]:
            - generic [ref=f6e411]:
              - img [ref=f6e414]
              - paragraph [ref=f6e418]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f6e422]:
                - strong [ref=f6e423]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f6e424]:
            - generic [ref=f6e426]:
              - img [ref=f6e429]
              - paragraph [ref=f6e433]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f6e437]:
                - strong [ref=f6e438]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f6e439]:
            - generic [ref=f6e441]:
              - img [ref=f6e444]
              - paragraph [ref=f6e448]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f6e452]:
                - strong [ref=f6e453]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f6e454]:
            - generic [ref=f6e456]:
              - img [ref=f6e459]
              - paragraph [ref=f6e463]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f6e467]:
                - strong [ref=f6e468]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f6e469]:
            - generic [ref=f6e471]:
              - img [ref=f6e474]
              - paragraph [ref=f6e478]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f6e482]:
                - strong [ref=f6e483]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f6e484]:
            - generic [ref=f6e486]:
              - img [ref=f6e489]
              - paragraph [ref=f6e493]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f6e497]:
                - strong [ref=f6e498]: Giacomo I.
