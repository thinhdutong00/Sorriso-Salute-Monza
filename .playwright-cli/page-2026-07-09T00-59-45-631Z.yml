          - group "17 / 17" [ref=f6e499]:
            - generic [ref=f6e501]:
              - img [ref=f6e504]
              - paragraph [ref=f6e508]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
