          - group "1 / 17" [ref=e546]:
            - generic [ref=e548]:
              - img [ref=e551]
              - paragraph [ref=e555]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e559]:
                - strong [ref=e560]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e561]:
            - generic [ref=e563]:
              - img [ref=e566]
              - paragraph [ref=e570]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
