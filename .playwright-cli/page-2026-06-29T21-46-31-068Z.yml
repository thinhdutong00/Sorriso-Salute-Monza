                - strong [ref=e575]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e576]:
            - generic [ref=e578]:
              - img [ref=e581]
              - paragraph [ref=e585]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e589]:
                - strong [ref=e590]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e591]:
            - generic [ref=e593]:
              - img [ref=e596]
              - paragraph [ref=e600]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=e604]:
                - strong [ref=e605]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=e606]:
            - generic [ref=e608]:
              - img [ref=e611]
              - paragraph [ref=e615]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
