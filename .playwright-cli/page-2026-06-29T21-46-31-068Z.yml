            - generic [ref=e533]:
              - img [ref=e536]
              - paragraph [ref=e540]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=e544]:
