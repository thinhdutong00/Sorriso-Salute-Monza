      - generic [ref=f30e515]:
        - generic [ref=f30e516]:
          - group "15 / 17" [ref=f30e517]:
            - generic [ref=f30e519]:
              - img [ref=f30e522]
              - paragraph [ref=f30e526]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f30e530]:
                - strong [ref=f30e531]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f30e532]:
            - generic [ref=f30e534]:
              - img [ref=f30e537]
              - paragraph [ref=f30e541]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f30e545]:
                - strong [ref=f30e546]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f30e547]:
            - generic [ref=f30e549]:
              - img [ref=f30e552]
              - paragraph [ref=f30e556]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f30e560]:
                - strong [ref=f30e561]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f30e562]:
            - generic [ref=f30e564]:
              - img [ref=f30e567]
              - paragraph [ref=f30e571]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f30e575]:
                - strong [ref=f30e576]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f30e577]:
            - generic [ref=f30e579]:
              - img [ref=f30e582]
              - paragraph [ref=f30e586]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f30e590]:
                - strong [ref=f30e591]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f30e592]:
            - generic [ref=f30e594]:
              - img [ref=f30e597]
              - paragraph [ref=f30e601]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f30e605]:
                - strong [ref=f30e606]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f30e607]:
            - generic [ref=f30e609]:
              - img [ref=f30e612]
              - paragraph [ref=f30e616]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f30e620]:
                - strong [ref=f30e621]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f30e622]:
            - generic [ref=f30e624]:
              - img [ref=f30e627]
              - paragraph [ref=f30e631]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f30e635]:
                - strong [ref=f30e636]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f30e637]:
            - generic [ref=f30e639]:
              - img [ref=f30e642]
              - paragraph [ref=f30e646]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f30e650]:
                - strong [ref=f30e651]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f30e652]:
            - generic [ref=f30e654]:
              - img [ref=f30e657]
              - paragraph [ref=f30e661]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f30e665]:
                - strong [ref=f30e666]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f30e667]:
            - generic [ref=f30e669]:
              - img [ref=f30e672]
              - paragraph [ref=f30e676]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f30e680]:
                - strong [ref=f30e681]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f30e682]:
            - generic [ref=f30e684]:
              - img [ref=f30e687]
              - paragraph [ref=f30e691]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f30e695]:
                - strong [ref=f30e696]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f30e697]:
            - generic [ref=f30e699]:
              - img [ref=f30e702]
              - paragraph [ref=f30e706]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f30e710]:
                - strong [ref=f30e711]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f30e712]:
            - generic [ref=f30e714]:
              - img [ref=f30e717]
              - paragraph [ref=f30e721]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f30e725]:
                - strong [ref=f30e726]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f30e727]:
            - generic [ref=f30e729]:
              - img [ref=f30e732]
              - paragraph [ref=f30e736]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f30e740]:
                - strong [ref=f30e741]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f30e742]:
            - generic [ref=f30e744]:
              - img [ref=f30e747]
              - paragraph [ref=f30e751]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f30e755]:
                - strong [ref=f30e756]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f30e757]:
            - generic [ref=f30e759]:
              - img [ref=f30e762]
              - paragraph [ref=f30e766]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f30e770]:
                - strong [ref=f30e771]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f30e772]:
            - generic [ref=f30e774]:
              - img [ref=f30e777]
              - paragraph [ref=f30e781]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f30e785]:
                - strong [ref=f30e786]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f30e787]:
            - generic [ref=f30e789]:
              - img [ref=f30e792]
              - paragraph [ref=f30e796]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f30e800]:
                - strong [ref=f30e801]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f30e802]:
            - generic [ref=f30e804]:
              - img [ref=f30e807]
              - paragraph [ref=f30e811]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f30e815]:
                - strong [ref=f30e816]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f30e817]:
            - generic [ref=f30e819]:
              - img [ref=f30e822]
              - paragraph [ref=f30e826]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f30e830]:
                - strong [ref=f30e831]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f30e832]:
            - generic [ref=f30e834]:
              - img [ref=f30e837]
              - paragraph [ref=f30e841]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f30e845]:
                - strong [ref=f30e846]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f30e847]:
            - generic [ref=f30e849]:
              - img [ref=f30e852]
              - paragraph [ref=f30e856]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f30e860]:
                - strong [ref=f30e861]: Giulia F.
                - text: Paziente
