      - generic [ref=f84e338]:
        - generic [ref=f84e339]:
          - group "17 / 17" [ref=f84e340]:
            - generic [ref=f84e342]:
              - img [ref=f84e345]
              - paragraph [ref=f84e349]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f84e353]:
                - strong [ref=f84e354]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f84e355]:
            - generic [ref=f84e357]:
              - img [ref=f84e360]
              - paragraph [ref=f84e364]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f84e368]:
                - strong [ref=f84e369]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f84e370]:
            - generic [ref=f84e372]:
              - img [ref=f84e375]
              - paragraph [ref=f84e379]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f84e383]:
                - strong [ref=f84e384]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f84e385]:
            - generic [ref=f84e387]:
              - img [ref=f84e390]
              - paragraph [ref=f84e394]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f84e398]:
                - strong [ref=f84e399]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f84e400]:
            - generic [ref=f84e402]:
              - img [ref=f84e405]
              - paragraph [ref=f84e409]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f84e413]:
                - strong [ref=f84e414]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f84e415]:
            - generic [ref=f84e417]:
              - img [ref=f84e420]
              - paragraph [ref=f84e424]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f84e428]:
                - strong [ref=f84e429]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f84e430]:
            - generic [ref=f84e432]:
              - img [ref=f84e435]
              - paragraph [ref=f84e439]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f84e443]:
                - strong [ref=f84e444]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f84e445]:
            - generic [ref=f84e447]:
              - img [ref=f84e450]
              - paragraph [ref=f84e454]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f84e458]:
                - strong [ref=f84e459]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f84e460]:
            - generic [ref=f84e462]:
              - img [ref=f84e465]
              - paragraph [ref=f84e469]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f84e473]:
                - strong [ref=f84e474]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f84e475]:
            - generic [ref=f84e477]:
              - img [ref=f84e480]
              - paragraph [ref=f84e484]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f84e488]:
                - strong [ref=f84e489]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f84e490]:
            - generic [ref=f84e492]:
              - img [ref=f84e495]
              - paragraph [ref=f84e499]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f84e503]:
                - strong [ref=f84e504]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f84e505]:
            - generic [ref=f84e507]:
              - img [ref=f84e510]
              - paragraph [ref=f84e514]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f84e518]:
                - strong [ref=f84e519]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f84e520]:
            - generic [ref=f84e522]:
              - img [ref=f84e525]
              - paragraph [ref=f84e529]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f84e533]:
                - strong [ref=f84e534]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f84e535]:
            - generic [ref=f84e537]:
              - img [ref=f84e540]
              - paragraph [ref=f84e544]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f84e548]:
                - strong [ref=f84e549]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f84e550]:
            - generic [ref=f84e552]:
              - img [ref=f84e555]
              - paragraph [ref=f84e559]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
