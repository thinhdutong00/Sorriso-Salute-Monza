        - heading "Implantologia" [level=1] [ref=f889e18]
        - paragraph [ref=f889e19]: Sostituisci i denti mancanti con soluzioni stabili, progettate per tornare a sorridere e masticare con sicurezza.
        - paragraph [ref=f889e20]:
          - strong [ref=f889e21]: Dal 2003 a Monza, attraverso solo la chirurgia implantare, abbiamo aiutato oltre 10.000 persone a ritrovare la sicurezza di sorridere e il piacere di masticare senza dolore.
    - region "In quale di queste situazioni ti trovi oggi?" [ref=f889e22]:
      - generic [ref=f889e23]:
        - paragraph [ref=f889e24]: AFFIDATI AI NOSTRI SPECIALISTI
        - heading "In quale di queste situazioni ti trovi oggi?" [level=2] [ref=f889e25]
        - paragraph [ref=f889e26]:
          - strong [ref=f889e27]: Più di 10.000 impianti posizionati e protesi stabilizzate con successo in 23 anni di attività.
      - generic "Situazioni implantari frequenti" [ref=f889e28]:
        - article [ref=f889e29]:
          - generic [ref=f889e31]:
            - generic [ref=f889e32]: Dente mancante
            - heading "Mi manca un solo dente" [level=3] [ref=f889e33]
            - paragraph [ref=f889e34]: Ripristina l'estetica e la funzionalità del tuo sorriso con un impianto di eccellenza. Una soluzione fissa e invisibile che preserva la salute dei denti adiacenti, garantendo un risultato naturale nel massimo comfort clinico.
            - button "Scopri le nostre convenzioni" [ref=f889e36] [cursor=pointer]
        - article [ref=f889e37]:
          - generic [ref=f889e39]:
            - generic [ref=f889e40]: Più denti mancanti
            - heading "Mi mancano più denti vicini" [level=3] [ref=f889e41]
            - paragraph [ref=f889e42]: Riscopri il piacere di una masticazione sicura. I nostri ponti su impianti offrono una stabilità assoluta, superando i limiti e i disagi delle soluzioni mobili. Un percorso riabilitativo sereno, per denti forti e duraturi.
            - button "Scopri le nostre convenzioni" [ref=f889e44] [cursor=pointer]
        - article [ref=f889e45]:
          - generic [ref=f889e47]:
            - generic [ref=f889e48]: Protesi mobile instabile
            - heading "La mia dentiera si muove" [level=3] [ref=f889e49]
            - paragraph [ref=f889e50]: Restituisci sicurezza e stabilità alla tua quotidianità. Ancoriamo saldamente la tua protesi attraverso soluzioni implantari minimamente invasive, eliminando ogni incertezza. Per un benessere prolungato e una ritrovata libertà.
            - button "Scopri le nostre convenzioni" [ref=f889e52] [cursor=pointer]
        - article [ref=f889e53]:
          - generic [ref=f889e55]:
            - generic [ref=f889e56]: Arcata completa / molti denti mancanti
            - heading "Ho perso molti denti o uso una dentiera" [level=3] [ref=f889e57]
            - paragraph [ref=f889e58]: L'eccellenza implantare per una riabilitazione totale. Grazie a protocolli clinici avanzati, puoi ottenere un'arcata fissa definitiva, spesso in meno di 24 ore. Un intervento delicato per restituirti un sorriso completo e funzionale.
            - button "Scopri le nostre convenzioni" [ref=f889e60] [cursor=pointer]
