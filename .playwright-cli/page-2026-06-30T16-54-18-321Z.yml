          - paragraph [ref=f889e143]: "In caso di dubbi o fastidi nel post-operatorio, applichiamo un protocollo interno rigido: ti assicuriamo una corsia preferenziale con visita e assistenza in sede il giorno stesso della tua chiamata, senza lasciarti mai solo."
