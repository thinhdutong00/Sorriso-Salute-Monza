      - generic [ref=f11e520]:
        - generic [ref=f11e521]:
          - group "17 / 17" [ref=f11e522]:
            - generic [ref=f11e524]:
              - img [ref=f11e527]
              - paragraph [ref=f11e531]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f11e535]:
                - strong [ref=f11e536]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f11e537]:
            - generic [ref=f11e539]:
              - img [ref=f11e542]
              - paragraph [ref=f11e546]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f11e550]:
                - strong [ref=f11e551]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f11e552]:
            - generic [ref=f11e554]:
              - img [ref=f11e557]
              - paragraph [ref=f11e561]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f11e565]:
                - strong [ref=f11e566]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f11e567]:
            - generic [ref=f11e569]:
              - img [ref=f11e572]
              - paragraph [ref=f11e576]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f11e580]:
                - strong [ref=f11e581]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f11e582]:
            - generic [ref=f11e584]:
              - img [ref=f11e587]
              - paragraph [ref=f11e591]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f11e595]:
                - strong [ref=f11e596]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f11e597]:
            - generic [ref=f11e599]:
              - img [ref=f11e602]
              - paragraph [ref=f11e606]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f11e610]:
                - strong [ref=f11e611]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f11e612]:
            - generic [ref=f11e614]:
              - img [ref=f11e617]
              - paragraph [ref=f11e621]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f11e625]:
                - strong [ref=f11e626]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f11e627]:
            - generic [ref=f11e629]:
              - img [ref=f11e632]
              - paragraph [ref=f11e636]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f11e640]:
                - strong [ref=f11e641]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f11e642]:
            - generic [ref=f11e644]:
              - img [ref=f11e647]
              - paragraph [ref=f11e651]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f11e655]:
                - strong [ref=f11e656]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f11e657]:
            - generic [ref=f11e659]:
              - img [ref=f11e662]
              - paragraph [ref=f11e666]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f11e670]:
                - strong [ref=f11e671]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f11e672]:
            - generic [ref=f11e674]:
              - img [ref=f11e677]
              - paragraph [ref=f11e681]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f11e685]:
                - strong [ref=f11e686]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f11e687]:
            - generic [ref=f11e689]:
              - img [ref=f11e692]
              - paragraph [ref=f11e696]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f11e700]:
                - strong [ref=f11e701]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f11e702]:
            - generic [ref=f11e704]:
              - img [ref=f11e707]
              - paragraph [ref=f11e711]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f11e715]:
                - strong [ref=f11e716]: Gabrio G.
