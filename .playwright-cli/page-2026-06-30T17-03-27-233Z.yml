            - generic [ref=f11e719]:
              - img [ref=f11e722]
              - paragraph [ref=f11e726]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f11e730]:
                - strong [ref=f11e731]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f11e732]:
            - generic [ref=f11e734]:
              - img [ref=f11e737]
              - paragraph [ref=f11e741]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f11e745]:
                - strong [ref=f11e746]: Michael T.
