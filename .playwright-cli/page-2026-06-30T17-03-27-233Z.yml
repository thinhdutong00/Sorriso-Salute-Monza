          - group "17 / 17" [ref=f11e777]:
            - generic [ref=f11e779]:
              - img [ref=f11e782]
              - paragraph [ref=f11e786]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
