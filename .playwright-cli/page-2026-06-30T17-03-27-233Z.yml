            - generic [ref=f11e794]:
              - img [ref=f11e797]
              - paragraph [ref=f11e801]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
