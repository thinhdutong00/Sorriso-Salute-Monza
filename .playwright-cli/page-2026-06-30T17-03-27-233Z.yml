          - group "15 / 17" [ref=f11e747]:
            - generic [ref=f11e749]:
              - img [ref=f11e752]
              - paragraph [ref=f11e756]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f11e760]:
                - strong [ref=f11e761]: Samir G.
                - text: Paziente
