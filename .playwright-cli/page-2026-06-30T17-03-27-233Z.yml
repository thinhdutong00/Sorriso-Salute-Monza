            - generic [ref=f11e764]:
              - img [ref=f11e767]
              - paragraph [ref=f11e771]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f11e775]:
                - strong [ref=f11e776]: Giacomo I.
