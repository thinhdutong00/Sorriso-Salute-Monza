                - text: Paziente
          - group "2 / 17" [ref=e575]:
            - generic [ref=e577]:
              - img [ref=e580]
              - paragraph [ref=e584]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
