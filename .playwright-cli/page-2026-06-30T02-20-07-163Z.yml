          - group "1 / 17" [ref=e560]:
            - generic [ref=e562]:
              - img [ref=e565]
              - paragraph [ref=e569]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
