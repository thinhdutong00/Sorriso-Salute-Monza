                - text: Paziente
          - group "3 / 17" [ref=e590]:
            - generic [ref=e592]:
              - img [ref=e595]
              - paragraph [ref=e599]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e603]:
                - strong [ref=e604]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e605]:
            - generic [ref=e607]:
              - img [ref=e610]
