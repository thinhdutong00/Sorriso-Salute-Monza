      - generic [ref=f7e511]:
        - generic [ref=f7e512]:
          - group "15 / 17" [ref=f7e513]:
            - generic [ref=f7e515]:
              - img [ref=f7e518]
              - paragraph [ref=f7e522]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f7e526]:
                - strong [ref=f7e527]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f7e528]:
            - generic [ref=f7e530]:
              - img [ref=f7e533]
              - paragraph [ref=f7e537]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f7e541]:
                - strong [ref=f7e542]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f7e543]:
            - generic [ref=f7e545]:
              - img [ref=f7e548]
              - generic [ref=f7e551]:
                - paragraph [ref=f7e552]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
                - button "leggi di più" [ref=f7e553] [cursor=pointer]
              - generic [ref=f7e557]:
                - strong [ref=f7e558]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f7e559]:
            - generic [ref=f7e561]:
              - img [ref=f7e564]
              - generic [ref=f7e567]:
                - paragraph [ref=f7e568]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
                - button "leggi di più" [ref=f7e569] [cursor=pointer]
              - generic [ref=f7e573]:
                - strong [ref=f7e574]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f7e575]:
            - generic [ref=f7e577]:
              - img [ref=f7e580]
              - generic [ref=f7e583]:
                - paragraph [ref=f7e584]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
                - button "leggi di più" [ref=f7e585] [cursor=pointer]
              - generic [ref=f7e589]:
                - strong [ref=f7e590]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f7e591]:
            - generic [ref=f7e593]:
              - img [ref=f7e596]
              - generic [ref=f7e599]:
                - paragraph [ref=f7e600]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
                - button "leggi di più" [ref=f7e601] [cursor=pointer]
              - generic [ref=f7e605]:
                - strong [ref=f7e606]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f7e607]:
            - generic [ref=f7e609]:
              - img [ref=f7e612]
              - paragraph [ref=f7e616]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f7e620]:
                - strong [ref=f7e621]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f7e622]:
            - generic [ref=f7e624]:
              - img [ref=f7e627]
              - generic [ref=f7e630]:
                - paragraph [ref=f7e631]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
                - button "leggi di più" [ref=f7e632] [cursor=pointer]
              - generic [ref=f7e636]:
                - strong [ref=f7e637]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f7e638]:
            - generic [ref=f7e640]:
              - img [ref=f7e643]
              - paragraph [ref=f7e647]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f7e651]:
                - strong [ref=f7e652]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f7e653]:
            - generic [ref=f7e655]:
              - img [ref=f7e658]
              - paragraph [ref=f7e662]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f7e666]:
                - strong [ref=f7e667]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f7e668]:
            - generic [ref=f7e670]:
              - img [ref=f7e673]
              - paragraph [ref=f7e677]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f7e681]:
                - strong [ref=f7e682]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f7e683]:
            - generic [ref=f7e685]:
              - img [ref=f7e688]
              - paragraph [ref=f7e692]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f7e696]:
                - strong [ref=f7e697]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f7e698]:
            - generic [ref=f7e700]:
              - img [ref=f7e703]
              - paragraph [ref=f7e707]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f7e711]:
                - strong [ref=f7e712]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f7e713]:
            - generic [ref=f7e715]:
              - img [ref=f7e718]
              - paragraph [ref=f7e722]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f7e726]:
                - strong [ref=f7e727]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f7e728]:
            - generic [ref=f7e730]:
              - img [ref=f7e733]
              - paragraph [ref=f7e737]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f7e741]:
                - strong [ref=f7e742]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f7e743]:
            - generic [ref=f7e745]:
              - img [ref=f7e748]
              - paragraph [ref=f7e752]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f7e756]:
                - strong [ref=f7e757]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f7e758]:
            - generic [ref=f7e760]:
              - img [ref=f7e763]
              - paragraph [ref=f7e767]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f7e771]:
                - strong [ref=f7e772]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f7e773]:
            - generic [ref=f7e775]:
              - img [ref=f7e778]
              - paragraph [ref=f7e782]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f7e786]:
                - strong [ref=f7e787]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f7e788]:
            - generic [ref=f7e790]:
              - img [ref=f7e793]
              - paragraph [ref=f7e797]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f7e801]:
                - strong [ref=f7e802]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f7e803]:
            - generic [ref=f7e805]:
              - img [ref=f7e808]
              - generic [ref=f7e811]:
                - paragraph [ref=f7e812]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
                - button "leggi di più" [ref=f7e813] [cursor=pointer]
              - generic [ref=f7e817]:
                - strong [ref=f7e818]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f7e819]:
            - generic [ref=f7e821]:
              - img [ref=f7e824]
              - generic [ref=f7e827]:
                - paragraph [ref=f7e828]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
                - button "leggi di più" [ref=f7e829] [cursor=pointer]
              - generic [ref=f7e833]:
                - strong [ref=f7e834]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f7e835]:
            - generic [ref=f7e837]:
              - img [ref=f7e840]
              - generic [ref=f7e843]:
                - paragraph [ref=f7e844]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
                - button "leggi di più" [ref=f7e845] [cursor=pointer]
              - generic [ref=f7e849]:
                - strong [ref=f7e850]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f7e851]:
            - generic [ref=f7e853]:
              - img [ref=f7e856]
              - generic [ref=f7e859]:
                - paragraph [ref=f7e860]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
