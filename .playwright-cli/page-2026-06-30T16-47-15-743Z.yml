      - generic [ref=f229e127]:
        - paragraph [ref=f229e128]: Siamo dalla tua parte
        - heading "Trasparenza e Tutele Cliniche" [level=2] [ref=f229e129]
        - paragraph [ref=f229e130]: La scelta di riabilitare il sorriso richiede massima chiarezza. Abbiamo eliminato ogni incertezza clinica ed economica formulando quattro garanzie scritte a salvaguardia del paziente.
      - generic [ref=f229e131]:
        - article [ref=f229e132]:
          - generic [ref=f229e133]: "01"
          - heading "Presenza e Stabilità a Monza dal 2003" [level=3] [ref=f229e134]
          - paragraph [ref=f229e135]: Non una catena low-cost o un franchising temporaneo. Questa storicità ti garantisce un punto di riferimento solido e sempre rintracciabile nel tempo, sia per l'esecuzione dell'intervento sia per i futuri controlli di manutenzione.
        - article [ref=f229e136]:
          - generic [ref=f229e137]: "02"
          - heading "Chirurgia Affidata Esclusivamente a Specialisti" [level=3] [ref=f229e138]
          - paragraph [ref=f229e139]: Ogni trattamento è eseguito da un'équipe dedicata alla chirurgia orale, guidata dalla Dott.ssa Moreschi e sotto la stretta direzione sanitaria della Dott.ssa Pareja Carrillo, garantendo i massimi standard di rigore clinico.
        - article [ref=f229e140]:
          - generic [ref=f229e141]: "03"
          - heading "Gestione Immediata delle Urgenze in Giornata" [level=3] [ref=f229e142]
          - paragraph [ref=f229e143]: "In caso di dubbi o fastidi nel post-operatorio, applichiamo un protocollo interno rigido: ti assicuriamo una corsia preferenziale con visita e assistenza in sede il giorno stesso della tua chiamata, senza lasciarti mai solo."
        - article [ref=f229e144]:
          - generic [ref=f229e145]: "04"
          - heading "Convenzioni e pagamenti chiari" [level=3] [ref=f229e146]
          - paragraph [ref=f229e147]:
            - text: Verifica se la tua copertura può essere utilizzata e valuta piani di rateizzazione personalizzati con istituti partner come Compass. Consulta le
            - button "convenzioni dirette" [ref=f229e148] [cursor=pointer]
