        - article [ref=f229e23]:
          - generic [ref=f229e25]:
            - generic [ref=f229e26]: Dente mancante
            - heading "Mi manca un solo dente" [level=3] [ref=f229e27]
            - paragraph [ref=f229e28]: Ripristina l'estetica e la funzionalità del tuo sorriso con un impianto di eccellenza. Una soluzione fissa e invisibile che preserva la salute dei denti adiacenti, garantendo un risultato naturale nel massimo comfort clinico.
            - button "Scopri le nostre convenzioni" [ref=f229e30] [cursor=pointer]
        - article [ref=f229e31]:
          - generic [ref=f229e33]:
            - generic [ref=f229e34]: Più denti mancanti
            - heading "Mi mancano più denti vicini" [level=3] [ref=f229e35]
            - paragraph [ref=f229e36]: Riscopri il piacere di una masticazione sicura. I nostri ponti su impianti offrono una stabilità assoluta, superando i limiti e i disagi delle soluzioni mobili. Un percorso riabilitativo sereno, per denti forti e duraturi.
            - button "Scopri le nostre convenzioni" [ref=f229e38] [cursor=pointer]
        - article [ref=f229e39]:
          - generic [ref=f229e41]:
            - generic [ref=f229e42]: Protesi mobile instabile
            - heading "La mia dentiera si muove" [level=3] [ref=f229e43]
            - paragraph [ref=f229e44]: Restituisci sicurezza e stabilità alla tua quotidianità. Ancoriamo saldamente la tua protesi attraverso soluzioni implantari minimamente invasive, eliminando ogni incertezza. Per un benessere prolungato e una ritrovata libertà.
            - button "Scopri le nostre convenzioni" [ref=f229e46] [cursor=pointer]
        - article [ref=f229e47]:
          - generic [ref=f229e49]:
            - generic [ref=f229e50]: Arcata completa / molti denti mancanti
            - heading "Ho perso molti denti o uso una dentiera" [level=3] [ref=f229e51]
            - paragraph [ref=f229e52]: L'eccellenza implantare per una riabilitazione totale. Grazie a protocolli clinici avanzati, puoi ottenere un'arcata fissa definitiva, spesso in meno di 24 ore. Un intervento delicato per restituirti un sorriso completo e funzionale.
            - button "Scopri le nostre convenzioni" [ref=f229e54] [cursor=pointer]
