        - heading "Implantologia" [level=1] [ref=f229e12]
        - paragraph [ref=f229e13]: Sostituisci i denti mancanti con soluzioni stabili, progettate per tornare a sorridere e masticare con sicurezza.
        - paragraph [ref=f229e14]:
          - strong [ref=f229e15]: Dal 2003 a Monza, attraverso solo la chirurgia implantare, abbiamo aiutato oltre 10.000 persone a ritrovare la sicurezza di sorridere e il piacere di masticare senza dolore.
          - text: Che ti manchi un solo dente o un'intera arcata, progettiamo la soluzione implantare su misura per restituirti il comfort che stai cercando.
    - region "In quale di queste situazioni ti trovi oggi?" [ref=f229e16]:
      - generic [ref=f229e17]:
        - paragraph [ref=f229e18]: AFFIDATI AI NOSTRI SPECIALISTI
