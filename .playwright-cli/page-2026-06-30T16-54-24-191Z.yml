        - heading "Implantologia" [level=1] [ref=f891e18]
        - paragraph [ref=f891e19]: Sostituisci i denti mancanti con soluzioni stabili, progettate per tornare a sorridere e masticare con sicurezza.
        - paragraph [ref=f891e20]:
          - strong [ref=f891e21]: Dal 2003 a Monza, attraverso solo la chirurgia implantare, abbiamo aiutato oltre 10.000 persone a ritrovare la sicurezza di sorridere e il piacere di masticare senza dolore.
          - text: Che ti manchi un solo dente o un'intera arcata, progettiamo la soluzione implantare su misura per restituirti il comfort che stai cercando.
    - region "In quale di queste situazioni ti trovi oggi?" [ref=f891e22]:
      - generic [ref=f891e23]:
        - paragraph [ref=f891e24]: AFFIDATI AI NOSTRI SPECIALISTI
        - heading "In quale di queste situazioni ti trovi oggi?" [level=2] [ref=f891e25]
        - paragraph [ref=f891e26]:
          - strong [ref=f891e27]: Più di 10.000 impianti posizionati e protesi stabilizzate con successo in 23 anni di attività.
      - generic "Situazioni implantari frequenti" [ref=f891e28]:
        - article [ref=f891e29]:
          - generic [ref=f891e31]:
            - generic [ref=f891e32]: Dente mancante
            - heading "Mi manca un solo dente" [level=3] [ref=f891e33]
            - paragraph [ref=f891e34]: Ripristina l'estetica e la funzionalità del tuo sorriso con un impianto di eccellenza. Una soluzione fissa e invisibile che preserva la salute dei denti adiacenti, garantendo un risultato naturale nel massimo comfort clinico.
            - button "Scopri le nostre convenzioni" [ref=f891e36] [cursor=pointer]
        - article [ref=f891e37]:
          - generic [ref=f891e39]:
            - generic [ref=f891e40]: Più denti mancanti
            - heading "Mi mancano più denti vicini" [level=3] [ref=f891e41]
            - paragraph [ref=f891e42]: Riscopri il piacere di una masticazione sicura. I nostri ponti su impianti offrono una stabilità assoluta, superando i limiti e i disagi delle soluzioni mobili. Un percorso riabilitativo sereno, per denti forti e duraturi.
            - button "Scopri le nostre convenzioni" [ref=f891e44] [cursor=pointer]
        - article [ref=f891e45]:
          - generic [ref=f891e47]:
            - generic [ref=f891e48]: Protesi mobile instabile
            - heading "La mia dentiera si muove" [level=3] [ref=f891e49]
            - paragraph [ref=f891e50]: Restituisci sicurezza e stabilità alla tua quotidianità. Ancoriamo saldamente la tua protesi attraverso soluzioni implantari minimamente invasive, eliminando ogni incertezza. Per un benessere prolungato e una ritrovata libertà.
            - button "Scopri le nostre convenzioni" [ref=f891e52] [cursor=pointer]
        - article [ref=f891e53]:
          - generic [ref=f891e55]:
            - generic [ref=f891e56]: Arcata completa / molti denti mancanti
            - heading "Ho perso molti denti o uso una dentiera" [level=3] [ref=f891e57]
            - paragraph [ref=f891e58]: L'eccellenza implantare per una riabilitazione totale. Grazie a protocolli clinici avanzati, puoi ottenere un'arcata fissa definitiva, spesso in meno di 24 ore. Un intervento delicato per restituirti un sorriso completo e funzionale.
            - button "Scopri le nostre convenzioni" [ref=f891e60] [cursor=pointer]
