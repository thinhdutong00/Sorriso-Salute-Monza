      - generic [ref=f891e133]:
        - paragraph [ref=f891e134]: Siamo dalla tua parte
        - heading "Trasparenza e Tutele Cliniche" [level=2] [ref=f891e135]
        - paragraph [ref=f891e136]: La scelta di riabilitare il sorriso richiede massima chiarezza. Abbiamo eliminato ogni incertezza clinica ed economica formulando quattro garanzie scritte a salvaguardia del paziente.
      - generic [ref=f891e137]:
        - article [ref=f891e138]:
          - generic [ref=f891e139]: "01"
          - heading "Presenza e Stabilità a Monza dal 2003" [level=3] [ref=f891e140]
          - paragraph [ref=f891e141]: Non una catena low-cost o un franchising temporaneo. Questa storicità ti garantisce un punto di riferimento solido e sempre rintracciabile nel tempo, sia per l'esecuzione dell'intervento sia per i futuri controlli di manutenzione.
        - article [ref=f891e142]:
          - generic [ref=f891e143]: "02"
          - heading "Chirurgia Affidata Esclusivamente a Specialisti" [level=3] [ref=f891e144]
          - paragraph [ref=f891e145]: Ogni trattamento è eseguito da un'équipe dedicata alla chirurgia orale, guidata dalla Dott.ssa Moreschi e sotto la stretta direzione sanitaria della Dott.ssa Pareja Carrillo, garantendo i massimi standard di rigore clinico.
        - article [ref=f891e146]:
          - generic [ref=f891e147]: "03"
          - heading "Gestione Immediata delle Urgenze in Giornata" [level=3] [ref=f891e148]
          - paragraph [ref=f891e149]: "In caso di dubbi o fastidi nel post-operatorio, applichiamo un protocollo interno rigido: ti assicuriamo una corsia preferenziale con visita e assistenza in sede il giorno stesso della tua chiamata, senza lasciarti mai solo."
        - article [ref=f891e150]:
          - generic [ref=f891e151]: "04"
          - heading "Convenzioni e pagamenti chiari" [level=3] [ref=f891e152]
          - paragraph [ref=f891e153]:
            - text: Verifica se la tua copertura può essere utilizzata e valuta piani di rateizzazione personalizzati con istituti partner come Compass. Consulta le
            - button "convenzioni dirette" [ref=f891e154] [cursor=pointer]
