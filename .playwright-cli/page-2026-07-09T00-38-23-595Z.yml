      - generic [ref=f12e241]:
        - generic [ref=f12e242]:
          - group "17 / 17" [ref=f12e243]:
            - generic [ref=f12e245]:
              - img [ref=f12e248]
              - paragraph [ref=f12e252]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f12e256]:
                - strong [ref=f12e257]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f12e258]:
            - generic [ref=f12e260]:
              - img [ref=f12e263]
              - paragraph [ref=f12e267]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f12e271]:
                - strong [ref=f12e272]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f12e273]:
            - generic [ref=f12e275]:
              - img [ref=f12e278]
              - paragraph [ref=f12e282]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f12e286]:
                - strong [ref=f12e287]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f12e288]:
            - generic [ref=f12e290]:
              - img [ref=f12e293]
              - paragraph [ref=f12e297]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f12e301]:
                - strong [ref=f12e302]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f12e303]:
            - generic [ref=f12e305]:
              - img [ref=f12e308]
              - paragraph [ref=f12e312]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f12e316]:
                - strong [ref=f12e317]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f12e318]:
            - generic [ref=f12e320]:
              - img [ref=f12e323]
              - paragraph [ref=f12e327]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f12e331]:
                - strong [ref=f12e332]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f12e333]:
            - generic [ref=f12e335]:
              - img [ref=f12e338]
              - paragraph [ref=f12e342]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f12e346]:
                - strong [ref=f12e347]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f12e348]:
            - generic [ref=f12e350]:
              - img [ref=f12e353]
              - paragraph [ref=f12e357]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f12e361]:
                - strong [ref=f12e362]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f12e363]:
            - generic [ref=f12e365]:
              - img [ref=f12e368]
              - paragraph [ref=f12e372]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f12e376]:
                - strong [ref=f12e377]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f12e378]:
            - generic [ref=f12e380]:
              - img [ref=f12e383]
              - paragraph [ref=f12e387]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f12e391]:
                - strong [ref=f12e392]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f12e393]:
            - generic [ref=f12e395]:
              - img [ref=f12e398]
              - paragraph [ref=f12e402]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f12e406]:
                - strong [ref=f12e407]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f12e408]:
            - generic [ref=f12e410]:
              - img [ref=f12e413]
              - paragraph [ref=f12e417]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f12e421]:
                - strong [ref=f12e422]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f12e423]:
            - generic [ref=f12e425]:
              - img [ref=f12e428]
              - paragraph [ref=f12e432]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f12e436]:
                - strong [ref=f12e437]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f12e438]:
            - generic [ref=f12e440]:
              - img [ref=f12e443]
              - paragraph [ref=f12e447]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f12e451]:
                - strong [ref=f12e452]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f12e453]:
            - generic [ref=f12e455]:
              - img [ref=f12e458]
              - paragraph [ref=f12e462]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f12e466]:
                - strong [ref=f12e467]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f12e468]:
            - generic [ref=f12e470]:
              - img [ref=f12e473]
              - paragraph [ref=f12e477]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f12e481]:
                - strong [ref=f12e482]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f12e483]:
            - generic [ref=f12e485]:
              - img [ref=f12e488]
              - paragraph [ref=f12e492]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f12e496]:
                - strong [ref=f12e497]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f12e498]:
            - generic [ref=f12e500]:
              - img [ref=f12e503]
              - paragraph [ref=f12e507]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
