          - group "17 / 17" [ref=e588]:
            - generic [ref=e590]:
              - img [ref=e593]
              - paragraph [ref=e597]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=e601]:
                - strong [ref=e602]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=e603]:
            - generic [ref=e605]:
              - img [ref=e608]
              - paragraph [ref=e612]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e616]:
                - strong [ref=e617]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e618]:
            - generic [ref=e620]:
              - img [ref=e623]
              - paragraph [ref=e627]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=e631]:
                - strong [ref=e632]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e633]:
            - generic [ref=e635]:
              - img [ref=e638]
              - paragraph [ref=e642]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e646]:
                - strong [ref=e647]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e648]:
            - generic [ref=e650]:
              - img [ref=e653]
              - paragraph [ref=e657]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=e661]:
                - strong [ref=e662]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=e663]:
            - generic [ref=e665]:
              - img [ref=e668]
              - paragraph [ref=e672]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=e676]:
                - strong [ref=e677]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=e678]:
            - generic [ref=e680]:
              - img [ref=e683]
              - paragraph [ref=e687]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=e691]:
                - strong [ref=e692]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=e693]:
            - generic [ref=e695]:
              - img [ref=e698]
              - paragraph [ref=e702]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=e706]:
                - strong [ref=e707]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=e708]:
            - generic [ref=e710]:
              - img [ref=e713]
