          - group "14 / 17" [ref=f12e732]:
            - generic [ref=f12e734]:
              - img [ref=f12e737]
              - paragraph [ref=f12e741]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
