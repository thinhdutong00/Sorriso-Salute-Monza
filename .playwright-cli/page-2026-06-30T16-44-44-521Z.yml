            - generic [ref=f12e779]:
              - img [ref=f12e782]
              - paragraph [ref=f12e786]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
