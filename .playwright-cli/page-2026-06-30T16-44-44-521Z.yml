      - generic [ref=f12e520]:
        - generic [ref=f12e521]:
          - group "17 / 17" [ref=f12e522]:
            - generic [ref=f12e524]:
              - img [ref=f12e527]
              - paragraph [ref=f12e531]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f12e535]:
                - strong [ref=f12e536]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f12e537]:
            - generic [ref=f12e539]:
              - img [ref=f12e542]
              - paragraph [ref=f12e546]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f12e550]:
                - strong [ref=f12e551]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f12e552]:
            - generic [ref=f12e554]:
              - img [ref=f12e557]
              - paragraph [ref=f12e561]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f12e565]:
                - strong [ref=f12e566]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f12e567]:
            - generic [ref=f12e569]:
              - img [ref=f12e572]
              - paragraph [ref=f12e576]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f12e580]:
                - strong [ref=f12e581]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f12e582]:
            - generic [ref=f12e584]:
              - img [ref=f12e587]
              - paragraph [ref=f12e591]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f12e595]:
                - strong [ref=f12e596]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f12e597]:
            - generic [ref=f12e599]:
              - img [ref=f12e602]
              - paragraph [ref=f12e606]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f12e610]:
                - strong [ref=f12e611]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f12e612]:
            - generic [ref=f12e614]:
              - img [ref=f12e617]
              - paragraph [ref=f12e621]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f12e625]:
                - strong [ref=f12e626]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f12e627]:
            - generic [ref=f12e629]:
              - img [ref=f12e632]
              - paragraph [ref=f12e636]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f12e640]:
                - strong [ref=f12e641]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f12e642]:
            - generic [ref=f12e644]:
              - img [ref=f12e647]
              - paragraph [ref=f12e651]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f12e655]:
                - strong [ref=f12e656]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f12e657]:
            - generic [ref=f12e659]:
              - img [ref=f12e662]
              - paragraph [ref=f12e666]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f12e670]:
                - strong [ref=f12e671]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f12e672]:
            - generic [ref=f12e674]:
              - img [ref=f12e677]
              - paragraph [ref=f12e681]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f12e685]:
                - strong [ref=f12e686]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f12e687]:
            - generic [ref=f12e689]:
              - img [ref=f12e692]
              - paragraph [ref=f12e696]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f12e700]:
                - strong [ref=f12e701]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f12e702]:
            - generic [ref=f12e704]:
              - img [ref=f12e707]
              - paragraph [ref=f12e711]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f12e715]:
                - strong [ref=f12e716]: Gabrio G.
