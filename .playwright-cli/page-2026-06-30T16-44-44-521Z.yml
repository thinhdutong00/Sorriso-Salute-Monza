            - generic [ref=f12e749]:
              - img [ref=f12e752]
              - paragraph [ref=f12e756]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
