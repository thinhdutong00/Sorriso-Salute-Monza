      - generic [ref=f36e519]:
        - generic [ref=f36e520]:
          - group "15 / 17" [ref=f36e521]:
            - generic [ref=f36e523]:
              - img [ref=f36e526]
              - paragraph [ref=f36e530]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f36e534]:
                - strong [ref=f36e535]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f36e536]:
            - generic [ref=f36e538]:
              - img [ref=f36e541]
              - paragraph [ref=f36e545]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f36e549]:
                - strong [ref=f36e550]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f36e551]:
            - generic [ref=f36e553]:
              - img [ref=f36e556]
              - paragraph [ref=f36e560]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f36e564]:
                - strong [ref=f36e565]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f36e566]:
            - generic [ref=f36e568]:
              - img [ref=f36e571]
              - paragraph [ref=f36e575]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f36e579]:
                - strong [ref=f36e580]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f36e581]:
            - generic [ref=f36e583]:
              - img [ref=f36e586]
              - paragraph [ref=f36e590]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f36e594]:
                - strong [ref=f36e595]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f36e596]:
            - generic [ref=f36e598]:
              - img [ref=f36e601]
              - paragraph [ref=f36e605]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f36e609]:
                - strong [ref=f36e610]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f36e611]:
            - generic [ref=f36e613]:
              - img [ref=f36e616]
              - paragraph [ref=f36e620]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f36e624]:
                - strong [ref=f36e625]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f36e626]:
            - generic [ref=f36e628]:
              - img [ref=f36e631]
              - paragraph [ref=f36e635]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f36e639]:
                - strong [ref=f36e640]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f36e641]:
            - generic [ref=f36e643]:
              - img [ref=f36e646]
              - paragraph [ref=f36e650]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f36e654]:
                - strong [ref=f36e655]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f36e656]:
            - generic [ref=f36e658]:
              - img [ref=f36e661]
              - paragraph [ref=f36e665]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f36e669]:
                - strong [ref=f36e670]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f36e671]:
            - generic [ref=f36e673]:
              - img [ref=f36e676]
              - paragraph [ref=f36e680]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f36e684]:
                - strong [ref=f36e685]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f36e686]:
            - generic [ref=f36e688]:
              - img [ref=f36e691]
              - paragraph [ref=f36e695]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f36e699]:
                - strong [ref=f36e700]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f36e701]:
            - generic [ref=f36e703]:
              - img [ref=f36e706]
              - paragraph [ref=f36e710]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f36e714]:
                - strong [ref=f36e715]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f36e716]:
            - generic [ref=f36e718]:
              - img [ref=f36e721]
              - paragraph [ref=f36e725]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f36e729]:
                - strong [ref=f36e730]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f36e731]:
            - generic [ref=f36e733]:
              - img [ref=f36e736]
              - paragraph [ref=f36e740]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f36e744]:
                - strong [ref=f36e745]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f36e746]:
            - generic [ref=f36e748]:
              - img [ref=f36e751]
              - paragraph [ref=f36e755]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f36e759]:
                - strong [ref=f36e760]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f36e761]:
            - generic [ref=f36e763]:
              - img [ref=f36e766]
              - paragraph [ref=f36e770]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f36e774]:
                - strong [ref=f36e775]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f36e776]:
            - generic [ref=f36e778]:
              - img [ref=f36e781]
              - paragraph [ref=f36e785]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f36e789]:
                - strong [ref=f36e790]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f36e791]:
            - generic [ref=f36e793]:
              - img [ref=f36e796]
              - paragraph [ref=f36e800]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f36e804]:
                - strong [ref=f36e805]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f36e806]:
            - generic [ref=f36e808]:
              - img [ref=f36e811]
              - paragraph [ref=f36e815]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f36e819]:
                - strong [ref=f36e820]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f36e821]:
            - generic [ref=f36e823]:
              - img [ref=f36e826]
              - paragraph [ref=f36e830]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f36e834]:
                - strong [ref=f36e835]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f36e836]:
            - generic [ref=f36e838]:
              - img [ref=f36e841]
              - paragraph [ref=f36e845]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f36e849]:
                - strong [ref=f36e850]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f36e851]:
            - generic [ref=f36e853]:
              - img [ref=f36e856]
              - paragraph [ref=f36e860]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f36e864]:
                - strong [ref=f36e865]: Giulia F.
                - text: Paziente
