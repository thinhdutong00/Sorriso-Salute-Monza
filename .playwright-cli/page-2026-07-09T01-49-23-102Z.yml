          - group "2 / 17" [ref=e610]:
            - generic [ref=e612]:
              - img [ref=e615]
              - generic [ref=e618]:
                - paragraph [ref=e619]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
