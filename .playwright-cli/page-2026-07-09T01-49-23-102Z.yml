                - strong [ref=e625]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e626]:
            - generic [ref=e628]:
              - img [ref=e631]
              - generic [ref=e634]:
                - paragraph [ref=e635]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
