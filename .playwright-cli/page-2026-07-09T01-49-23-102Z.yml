            - generic [ref=e596]:
              - img [ref=e599]
              - generic [ref=e602]:
                - paragraph [ref=e603]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
