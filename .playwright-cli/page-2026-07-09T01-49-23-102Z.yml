            - generic [ref=e580]:
              - img [ref=e583]
              - generic [ref=e586]:
                - paragraph [ref=e587]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
