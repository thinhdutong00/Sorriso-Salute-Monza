      - generic [ref=f2e556]:
        - generic [ref=f2e557]:
          - group "15 / 17" [ref=f2e558]:
            - generic [ref=f2e560]:
              - img [ref=f2e563]
              - paragraph [ref=f2e567]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f2e571]:
                - strong [ref=f2e572]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f2e573]:
            - generic [ref=f2e575]:
              - img [ref=f2e578]
              - paragraph [ref=f2e582]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f2e586]:
                - strong [ref=f2e587]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f2e588]:
            - generic [ref=f2e590]:
              - img [ref=f2e593]
              - paragraph [ref=f2e597]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f2e601]:
                - strong [ref=f2e602]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f2e603]:
            - generic [ref=f2e605]:
              - img [ref=f2e608]
              - paragraph [ref=f2e612]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f2e616]:
                - strong [ref=f2e617]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f2e618]:
            - generic [ref=f2e620]:
              - img [ref=f2e623]
              - paragraph [ref=f2e627]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f2e631]:
                - strong [ref=f2e632]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f2e633]:
            - generic [ref=f2e635]:
              - img [ref=f2e638]
              - paragraph [ref=f2e642]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f2e646]:
                - strong [ref=f2e647]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f2e648]:
            - generic [ref=f2e650]:
              - img [ref=f2e653]
              - paragraph [ref=f2e657]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f2e661]:
                - strong [ref=f2e662]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f2e663]:
            - generic [ref=f2e665]:
              - img [ref=f2e668]
              - paragraph [ref=f2e672]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f2e676]:
                - strong [ref=f2e677]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f2e678]:
            - generic [ref=f2e680]:
              - img [ref=f2e683]
              - paragraph [ref=f2e687]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f2e691]:
                - strong [ref=f2e692]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f2e693]:
            - generic [ref=f2e695]:
              - img [ref=f2e698]
              - paragraph [ref=f2e702]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f2e706]:
                - strong [ref=f2e707]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f2e708]:
            - generic [ref=f2e710]:
              - img [ref=f2e713]
              - paragraph [ref=f2e717]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f2e721]:
                - strong [ref=f2e722]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f2e723]:
            - generic [ref=f2e725]:
              - img [ref=f2e728]
              - paragraph [ref=f2e732]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f2e736]:
                - strong [ref=f2e737]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f2e738]:
            - generic [ref=f2e740]:
              - img [ref=f2e743]
              - paragraph [ref=f2e747]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f2e751]:
                - strong [ref=f2e752]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f2e753]:
            - generic [ref=f2e755]:
              - img [ref=f2e758]
              - paragraph [ref=f2e762]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f2e766]:
                - strong [ref=f2e767]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f2e768]:
            - generic [ref=f2e770]:
              - img [ref=f2e773]
              - paragraph [ref=f2e777]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f2e781]:
                - strong [ref=f2e782]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f2e783]:
            - generic [ref=f2e785]:
              - img [ref=f2e788]
              - paragraph [ref=f2e792]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f2e796]:
                - strong [ref=f2e797]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f2e798]:
            - generic [ref=f2e800]:
              - img [ref=f2e803]
              - paragraph [ref=f2e807]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f2e811]:
                - strong [ref=f2e812]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f2e813]:
            - generic [ref=f2e815]:
              - img [ref=f2e818]
              - paragraph [ref=f2e822]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f2e826]:
                - strong [ref=f2e827]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f2e828]:
            - generic [ref=f2e830]:
              - img [ref=f2e833]
              - paragraph [ref=f2e837]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f2e841]:
                - strong [ref=f2e842]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f2e843]:
            - generic [ref=f2e845]:
              - img [ref=f2e848]
              - paragraph [ref=f2e852]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f2e856]:
                - strong [ref=f2e857]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f2e858]:
            - generic [ref=f2e860]:
              - img [ref=f2e863]
              - paragraph [ref=f2e867]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f2e871]:
                - strong [ref=f2e872]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f2e873]:
            - generic [ref=f2e875]:
              - img [ref=f2e878]
              - paragraph [ref=f2e882]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f2e886]:
                - strong [ref=f2e887]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f2e888]:
            - generic [ref=f2e890]:
              - img [ref=f2e893]
              - paragraph [ref=f2e897]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f2e901]:
                - strong [ref=f2e902]: Giulia F.
                - text: Paziente
