      - generic [ref=f90e238]:
        - generic [ref=f90e239]:
          - group "17 / 17" [ref=f90e240]:
            - generic [ref=f90e242]:
              - img [ref=f90e245]
              - paragraph [ref=f90e249]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f90e253]:
                - strong [ref=f90e254]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f90e255]:
            - generic [ref=f90e257]:
              - img [ref=f90e260]
              - paragraph [ref=f90e264]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f90e268]:
                - strong [ref=f90e269]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f90e270]:
            - generic [ref=f90e272]:
              - img [ref=f90e275]
              - paragraph [ref=f90e279]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f90e283]:
                - strong [ref=f90e284]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f90e285]:
            - generic [ref=f90e287]:
              - img [ref=f90e290]
              - paragraph [ref=f90e294]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f90e298]:
                - strong [ref=f90e299]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f90e300]:
            - generic [ref=f90e302]:
              - img [ref=f90e305]
              - paragraph [ref=f90e309]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f90e313]:
                - strong [ref=f90e314]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f90e315]:
            - generic [ref=f90e317]:
              - img [ref=f90e320]
              - paragraph [ref=f90e324]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f90e328]:
                - strong [ref=f90e329]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f90e330]:
            - generic [ref=f90e332]:
              - img [ref=f90e335]
              - paragraph [ref=f90e339]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f90e343]:
                - strong [ref=f90e344]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f90e345]:
            - generic [ref=f90e347]:
              - img [ref=f90e350]
              - paragraph [ref=f90e354]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f90e358]:
                - strong [ref=f90e359]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f90e360]:
            - generic [ref=f90e362]:
              - img [ref=f90e365]
              - paragraph [ref=f90e369]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f90e373]:
                - strong [ref=f90e374]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f90e375]:
            - generic [ref=f90e377]:
              - img [ref=f90e380]
              - paragraph [ref=f90e384]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f90e388]:
                - strong [ref=f90e389]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f90e390]:
            - generic [ref=f90e392]:
              - img [ref=f90e395]
              - paragraph [ref=f90e399]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f90e403]:
                - strong [ref=f90e404]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f90e405]:
            - generic [ref=f90e407]:
              - img [ref=f90e410]
              - paragraph [ref=f90e414]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f90e418]:
                - strong [ref=f90e419]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f90e420]:
