        - heading "Trasparenza e Tutele Cliniche" [level=2] [ref=f890e129]
        - paragraph [ref=f890e130]: La scelta di riabilitare il sorriso richiede massima chiarezza. Abbiamo eliminato ogni incertezza clinica ed economica formulando quattro garanzie scritte a salvaguardia del paziente.
      - generic [ref=f890e131]:
