            - heading "Valutazione e diagnosi 3D" [level=3] [ref=f890e81]
            - paragraph [ref=f890e82]: Analisi iniziale, studio radiografico e, quando necessario, diagnosi 3D per valutare osso, posizione degli impianti e fattibilità del trattamento.
        - article [ref=f890e83]:
          - img [ref=f890e85]
          - generic [ref=f890e88]:
            - heading "Piano implantoprotesico personalizzato" [level=3] [ref=f890e89]
            - paragraph [ref=f890e90]: Il dentista definisce se il caso può richiedere impianto singolo, ponte su impianti, protesi stabilizzata o protesi fissa su impianti.
        - article [ref=f890e91]:
          - img [ref=f890e93]
          - generic [ref=f890e96]:
            - heading "Intervento e comfort" [level=3] [ref=f890e97]
            - paragraph [ref=f890e98]: Quando indicato, vengono usate tecniche mininvasive e strumenti per gestire ansia e comfort durante la seduta.
        - article [ref=f890e99]:
          - img [ref=f890e101]
          - generic [ref=f890e104]:
            - heading "Protesi finale e controlli" [level=3] [ref=f890e105]
            - paragraph [ref=f890e106]: Dopo la fase implantare, viene realizzata la protesi finale e programmato il monitoraggio nel tempo.
      - link "Prenota una Visita Ora" [ref=f890e107] [cursor=pointer]:
