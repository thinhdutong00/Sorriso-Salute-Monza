      - generic [ref=f18e219]:
        - generic [ref=f18e220]:
          - group "17 / 17" [ref=f18e221]:
            - generic [ref=f18e223]:
              - img [ref=f18e226]
              - paragraph [ref=f18e230]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f18e234]:
                - strong [ref=f18e235]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f18e236]:
            - generic [ref=f18e238]:
              - img [ref=f18e241]
              - paragraph [ref=f18e245]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f18e249]:
                - strong [ref=f18e250]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f18e251]:
            - generic [ref=f18e253]:
              - img [ref=f18e256]
              - paragraph [ref=f18e260]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f18e264]:
                - strong [ref=f18e265]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f18e266]:
            - generic [ref=f18e268]:
              - img [ref=f18e271]
              - paragraph [ref=f18e275]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f18e279]:
                - strong [ref=f18e280]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f18e281]:
            - generic [ref=f18e283]:
              - img [ref=f18e286]
              - paragraph [ref=f18e290]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f18e294]:
                - strong [ref=f18e295]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f18e296]:
            - generic [ref=f18e298]:
              - img [ref=f18e301]
              - paragraph [ref=f18e305]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f18e309]:
                - strong [ref=f18e310]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f18e311]:
            - generic [ref=f18e313]:
              - img [ref=f18e316]
              - paragraph [ref=f18e320]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f18e324]:
                - strong [ref=f18e325]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f18e326]:
            - generic [ref=f18e328]:
              - img [ref=f18e331]
              - paragraph [ref=f18e335]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f18e339]:
                - strong [ref=f18e340]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f18e341]:
            - generic [ref=f18e343]:
              - img [ref=f18e346]
              - paragraph [ref=f18e350]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f18e354]:
                - strong [ref=f18e355]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f18e356]:
            - generic [ref=f18e358]:
              - img [ref=f18e361]
              - paragraph [ref=f18e365]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f18e369]:
                - strong [ref=f18e370]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f18e371]:
            - generic [ref=f18e373]:
              - img [ref=f18e376]
              - paragraph [ref=f18e380]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f18e384]:
                - strong [ref=f18e385]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f18e386]:
            - generic [ref=f18e388]:
              - img [ref=f18e391]
              - paragraph [ref=f18e395]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f18e399]:
                - strong [ref=f18e400]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f18e401]:
            - generic [ref=f18e403]:
              - img [ref=f18e406]
              - paragraph [ref=f18e410]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f18e414]:
                - strong [ref=f18e415]: Gabrio G.
                - text: Paziente
          - group "13 / 17" [ref=f18e416]:
            - generic [ref=f18e418]:
              - img [ref=f18e421]
              - paragraph [ref=f18e425]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f18e429]:
                - strong [ref=f18e430]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f18e431]:
            - generic [ref=f18e433]:
              - img [ref=f18e436]
              - paragraph [ref=f18e440]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f18e444]:
                - strong [ref=f18e445]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f18e446]:
            - generic [ref=f18e448]:
              - img [ref=f18e451]
              - paragraph [ref=f18e455]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f18e459]:
                - strong [ref=f18e460]: Samir G.
                - text: Paziente
          - group "16 / 17" [ref=f18e461]:
            - generic [ref=f18e463]:
              - img [ref=f18e466]
              - paragraph [ref=f18e470]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f18e474]:
                - strong [ref=f18e475]: Giacomo I.
                - text: Paziente
          - group "17 / 17" [ref=f18e476]:
            - generic [ref=f18e478]:
              - img [ref=f18e481]
              - paragraph [ref=f18e485]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f18e489]:
