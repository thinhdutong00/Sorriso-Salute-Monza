      - generic [ref=f6e520]:
        - generic [ref=f6e521]:
          - group "17 / 17" [ref=f6e522]:
            - generic [ref=f6e524]:
              - img [ref=f6e527]
              - paragraph [ref=f6e531]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=f6e535]:
                - strong [ref=f6e536]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=f6e537]:
            - generic [ref=f6e539]:
              - img [ref=f6e542]
              - paragraph [ref=f6e546]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=f6e550]:
                - strong [ref=f6e551]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=f6e552]:
            - generic [ref=f6e554]:
              - img [ref=f6e557]
              - paragraph [ref=f6e561]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=f6e565]:
                - strong [ref=f6e566]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=f6e567]:
            - generic [ref=f6e569]:
              - img [ref=f6e572]
              - paragraph [ref=f6e576]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=f6e580]:
                - strong [ref=f6e581]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=f6e582]:
            - generic [ref=f6e584]:
              - img [ref=f6e587]
              - paragraph [ref=f6e591]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=f6e595]:
                - strong [ref=f6e596]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=f6e597]:
            - generic [ref=f6e599]:
              - img [ref=f6e602]
              - paragraph [ref=f6e606]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=f6e610]:
                - strong [ref=f6e611]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=f6e612]:
            - generic [ref=f6e614]:
              - img [ref=f6e617]
              - paragraph [ref=f6e621]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=f6e625]:
                - strong [ref=f6e626]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=f6e627]:
            - generic [ref=f6e629]:
              - img [ref=f6e632]
              - paragraph [ref=f6e636]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=f6e640]:
                - strong [ref=f6e641]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=f6e642]:
            - generic [ref=f6e644]:
              - img [ref=f6e647]
              - paragraph [ref=f6e651]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=f6e655]:
                - strong [ref=f6e656]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=f6e657]:
            - generic [ref=f6e659]:
              - img [ref=f6e662]
              - paragraph [ref=f6e666]: La dottoressa è molto competente, oltre ad essere cordiale. Durante la visita, ha saputo mettermi a mio agio.
              - generic [ref=f6e670]:
                - strong [ref=f6e671]: Barbara V.
                - text: Paziente
          - group "10 / 17" [ref=f6e672]:
            - generic [ref=f6e674]:
              - img [ref=f6e677]
              - paragraph [ref=f6e681]: Pignola, precisa , attenta alle problematiche del paziente...spiega il da farsi in modo dettagliato...disponibile...
              - generic [ref=f6e685]:
                - strong [ref=f6e686]: Rossella B.
                - text: Paziente
          - group "11 / 17" [ref=f6e687]:
            - generic [ref=f6e689]:
              - img [ref=f6e692]
              - paragraph [ref=f6e696]: Molto precisa ed attenta, infonde fiducia nel paziente. Dentista davvero molto professionale
              - generic [ref=f6e700]:
                - strong [ref=f6e701]: Giorgio B.
                - text: Paziente
          - group "12 / 17" [ref=f6e702]:
            - generic [ref=f6e704]:
              - img [ref=f6e707]
              - paragraph [ref=f6e711]: Cordialità, preparazione professionale, capacità di spiegare e di consigliare
              - generic [ref=f6e715]:
                - strong [ref=f6e716]: Gabrio G.
