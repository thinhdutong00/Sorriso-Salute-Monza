          - group "13 / 17" [ref=f6e717]:
            - generic [ref=f6e719]:
              - img [ref=f6e722]
              - paragraph [ref=f6e726]: Professionalità gentilezza pazienza competenza spiegazione
              - generic [ref=f6e730]:
                - strong [ref=f6e731]: Paolo S.
                - text: Paziente
          - group "14 / 17" [ref=f6e732]:
            - generic [ref=f6e734]:
              - img [ref=f6e737]
              - paragraph [ref=f6e741]: Ottima professionista. Intervento svolto con sicurezza, brevità ed anestesia molto efficace. Postumi senza particolari problemi
              - generic [ref=f6e745]:
                - strong [ref=f6e746]: Michael T.
                - text: Paziente
          - group "15 / 17" [ref=f6e747]:
            - generic [ref=f6e749]:
              - img [ref=f6e752]
              - paragraph [ref=f6e756]: Dottoressa molto precisa e accurata. Grande esperienza nelle visite e ottimi consigli per la cura. Sempre in buone mani! Grazie
              - generic [ref=f6e760]:
                - strong [ref=f6e761]: Samir G.
                - text: Paziente
