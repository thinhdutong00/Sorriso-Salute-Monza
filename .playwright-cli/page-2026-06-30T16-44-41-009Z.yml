            - generic [ref=f6e764]:
              - img [ref=f6e767]
              - paragraph [ref=f6e771]: Dottoressa empatica e molto disponibile. Dimostrata molta attenzione per il mio caso. Buona esperienza
              - generic [ref=f6e775]:
                - strong [ref=f6e776]: Giacomo I.
