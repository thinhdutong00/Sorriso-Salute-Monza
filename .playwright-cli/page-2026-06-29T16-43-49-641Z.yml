          - group "17 / 17" [ref=e550]:
            - generic [ref=e552]:
              - img [ref=e555]
              - paragraph [ref=e559]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=e563]:
                - strong [ref=e564]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=e565]:
            - generic [ref=e567]:
              - img [ref=e570]
              - paragraph [ref=e574]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e578]:
                - strong [ref=e579]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e580]:
            - generic [ref=e582]:
              - img [ref=e585]
              - paragraph [ref=e589]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=e593]:
                - strong [ref=e594]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e595]:
            - generic [ref=e597]:
              - img [ref=e600]
              - paragraph [ref=e604]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e608]:
                - strong [ref=e609]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e610]:
            - generic [ref=e612]:
              - img [ref=e615]
              - paragraph [ref=e619]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=e623]:
                - strong [ref=e624]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=e625]:
            - generic [ref=e627]:
              - img [ref=e630]
              - paragraph [ref=e634]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=e638]:
                - strong [ref=e639]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=e640]:
            - generic [ref=e642]:
              - img [ref=e645]
              - paragraph [ref=e649]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=e653]:
                - strong [ref=e654]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=e655]:
            - generic [ref=e657]:
              - img [ref=e660]
              - paragraph [ref=e664]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
