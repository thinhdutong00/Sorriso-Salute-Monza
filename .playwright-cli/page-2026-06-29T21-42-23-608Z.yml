          - group "17 / 17" [ref=e1196]:
            - generic [ref=e1198]:
              - img [ref=e1201]
              - paragraph [ref=e1205]: La dottoressa è stata molto capace e comprensiva. Mi ha messo a mio agio. Non ho avuto nessun tipo di fastidio dopo la seduta. Trovo che sia molto professionale, gentile e premurosa.
              - generic [ref=e1209]:
                - strong [ref=e1210]: Samira E.
                - text: Paziente
          - group "1 / 17" [ref=e1211]:
            - generic [ref=e454]:
              - img [ref=e457]
              - paragraph [ref=e461]: Avevo molta paura dell’intervento, ma il dottore e tutto lo staff mi hanno messa subito a mio agio. L’implantologia è stata indolore e il risultato estetico è perfetto. Mi sento finalmente di nuovo a mio agio nel sorridere!
              - generic [ref=e465]:
                - strong [ref=e466]: Marta R.
                - text: Paziente
          - group "2 / 17" [ref=e1212]:
            - generic [ref=e469]:
              - img [ref=e472]
              - paragraph [ref=e476]: Ho scelto le mascherine trasparenti per allineare i denti senza compromettere l’estetica. Risultato eccellente e tempi rispettati. Studio serio, preciso e tecnologicamente avanzato.
              - generic [ref=e480]:
                - strong [ref=e481]: Roberta P.
                - text: Paziente
          - group "3 / 17" [ref=e1213]:
            - generic [ref=e484]:
              - img [ref=e487]
              - paragraph [ref=e491]: Mi rivolgo a Sorriso & Salute da anni per la pulizia e la prevenzione. Sono sempre puntuali, professionali e gentili. È bello trovare un ambiente così accogliente e curato.
              - generic [ref=e495]:
                - strong [ref=e496]: Giulia F.
                - text: Paziente
          - group "4 / 17" [ref=e1214]:
            - generic [ref=e499]:
              - img [ref=e502]
              - paragraph [ref=e506]: Finalmente uno studio dove ti ascoltano davvero. Trattamento preciso e indolore. Consigliato!
              - generic [ref=e510]:
                - strong [ref=e511]: Giacomo P.
                - text: Paziente
          - group "5 / 17" [ref=e1215]:
            - generic [ref=e514]:
              - img [ref=e517]
              - paragraph [ref=e521]: Dopo vari problemi dentali, ho finalmente ritrovato un sorriso naturale e funzionale. La professionalità del team e l’attenzione ai dettagli sono davvero impareggiabili.
              - generic [ref=e525]:
                - strong [ref=e526]: Jenny S.
                - text: Paziente
          - group "6 / 17" [ref=e1216]:
            - generic [ref=e529]:
              - img [ref=e532]
              - paragraph [ref=e536]: Ambiente pulito, moderno e accogliente. Trattamento perfetto e senza dolore. Bravi davvero!
              - generic [ref=e540]:
                - strong [ref=e541]: Monica F.
                - text: Paziente
          - group "7 / 17" [ref=e1217]:
            - generic [ref=e544]:
              - img [ref=e547]
              - paragraph [ref=e551]: Valutazione clinica molto accurata, con fotografie intraorali e scanner digitale. Grande attenzione alla diagnosi.
              - generic [ref=e555]:
                - strong [ref=e556]: Giuseppe G.
                - text: Paziente
          - group "8 / 17" [ref=e1218]:
            - generic [ref=e559]:
              - img [ref=e562]
              - paragraph [ref=e566]: "Molto soddisfatta dell’otturazione estetica: colore perfetto e modellazione molto precisa. Nessuna sensibilità post-trattamento."
              - generic [ref=e570]:
                - strong [ref=e571]: Sofia E.
                - text: Paziente
          - group "9 / 17" [ref=e1219]:
            - generic [ref=e574]:
